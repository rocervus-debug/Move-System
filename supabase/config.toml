# Supabase project config for Move Sistema Interno
# https://supabase.com/docs/guides/local-development

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_signup = true

[functions.move-login]
verify_jwt = false

[functions.move-register]
verify_jwt = false
