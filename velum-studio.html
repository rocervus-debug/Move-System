<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VELUM Studio — Sistema de Agentes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050C14; --bg2:#081522; --panel:#0A1826; --panel2:#0d1f30;
  --line:rgba(120,190,220,.10); --line2:rgba(120,190,220,.18);
  --text:#E8EDF5; --text2:#8FB4C4; --text3:#4A6B7C;
  --accent:#00D4FF; --champagne:#C9A86A; --salvia:#5EC8B0;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono',ui-monospace,'Roboto Mono',Menlo,monospace;
}
html,body{height:100%;}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  overflow:hidden;height:100vh;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
/* ── Top bar ── */
.topbar{
  height:52px;flex:0 0 52px;display:flex;align-items:center;gap:16px;
  padding:0 18px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--bg2),var(--bg));z-index:20;
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand .star{filter:drop-shadow(0 0 8px rgba(0,212,255,.6));}
.brand-name{font-weight:800;letter-spacing:4px;font-size:15px;}
.brand-sub{font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-top:1px;}
.cmd{
  flex:1;max-width:520px;margin:0 auto;position:relative;
}
.cmd input{
  width:100%;height:34px;border-radius:9px;border:1px solid var(--line2);
  background:rgba(0,212,255,.04);color:var(--text);font-family:var(--font);
  font-size:13px;padding:0 38px 0 34px;outline:none;transition:border-color .2s;
}
.cmd input:focus{border-color:rgba(0,212,255,.5);}
.cmd .ico{position:absolute;left:11px;top:9px;color:var(--text3);}
.cmd .kbd{position:absolute;right:9px;top:8px;font-size:10px;color:var(--text3);border:1px solid var(--line2);border-radius:5px;padding:2px 6px;font-family:var(--mono);}
.status-chip{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--salvia);box-shadow:0 0 8px var(--salvia);}
/* ── Layout ── */
.body{flex:1;display:flex;min-height:0;}
.sidebar{
  width:240px;flex:0 0 240px;border-right:1px solid var(--line);
  background:var(--bg2);overflow-y:auto;padding:12px 8px;
}
.side-h{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:8px 10px 6px;display:flex;justify-content:space-between;}
.pod-group{margin-bottom:4px;}
.pod-label{
  font-size:11px;font-weight:700;color:var(--text2);padding:7px 10px;
  display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:7px;text-transform:uppercase;letter-spacing:.5px;
}
.pod-label:hover{background:rgba(255,255,255,.03);}
.pod-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.agent-row{
  display:flex;align-items:center;gap:9px;padding:6px 10px 6px 26px;
  font-size:12.5px;color:var(--text2);cursor:pointer;border-radius:7px;transition:background .15s;
}
.agent-row:hover{background:rgba(0,212,255,.05);color:var(--text);}
.agent-row.active{background:rgba(0,212,255,.10);color:var(--text);}
.agent-row .rd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.agent-row .rname{flex:1;font-weight:600;}
.agent-row .rnew{font-size:8px;font-weight:700;letter-spacing:.5px;color:#001828;background:var(--accent);border-radius:4px;padding:1px 4px;}
/* ── Stage (isometric office) ── */
.stage-wrap{flex:1;position:relative;min-width:0;overflow:hidden;
  background:
    radial-gradient(ellipse 60% 45% at 50% 34%, rgba(0,212,255,.09), transparent 70%),
    var(--bg);
}
.stage{position:absolute;inset:0;}
#floorSvg{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);}
.avatar{
  position:absolute;transform:translate(-50%,-100%);cursor:pointer;
  transition:filter .2s, transform .2s;text-align:center;z-index:2;
}
.avatar:hover{filter:brightness(1.15);z-index:6;}
.avatar.sel{z-index:7;}
.bot{position:relative;width:44px;height:52px;margin:0 auto;}
.bot .shadow{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:34px;height:11px;border-radius:50%;background:rgba(0,0,0,.45);filter:blur(3px);}
.bot .halo{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;opacity:.5;filter:blur(11px);}
.bot .body{
  position:absolute;left:50%;top:6px;transform:translateX(-50%);
  width:34px;height:40px;border-radius:17px 17px 15px 15px;
  background:linear-gradient(160deg,#f4f9ff,#c3d4e0 55%,#93a9b8);
  box-shadow:inset 0 -6px 10px rgba(0,0,0,.18), 0 3px 8px rgba(0,0,0,.35);
}
.bot .visor{
  position:absolute;left:50%;top:15px;transform:translateX(-50%);
  width:26px;height:16px;border-radius:9px;background:#0a1a24;
  display:flex;align-items:center;justify-content:center;gap:5px;
  box-shadow:inset 0 0 4px rgba(0,0,0,.6);
}
.bot .eye{width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;animation:blink 4s infinite;}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.15)}}
.bot .ant{position:absolute;left:50%;top:0;transform:translateX(-50%);width:2px;height:8px;background:#9db2c0;}
.bot .ant::after{content:'';position:absolute;left:50%;top:-3px;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;}
.av-tag{
  margin-top:5px;display:inline-flex;flex-direction:column;align-items:center;
  background:rgba(8,20,32,.82);border:1px solid var(--line2);border-radius:8px;
  padding:3px 9px;backdrop-filter:blur(4px);
}
.av-tag .an{font-size:10.5px;font-weight:800;letter-spacing:1px;line-height:1.1;}
.av-tag .ar{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;white-space:nowrap;}
.av-status{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;border:2px solid var(--bg2);}
/* ── Inspector ── */
.inspector{
  width:300px;flex:0 0 300px;border-left:1px solid var(--line);
  background:var(--bg2);overflow-y:auto;
}
.mini{margin:12px;border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:12px;}
.mini-h{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:9px;display:flex;justify-content:space-between;}
.mini-map{position:relative;height:120px;border-radius:9px;background:radial-gradient(ellipse at 50% 45%,rgba(0,212,255,.10),transparent 70%),var(--bg);overflow:hidden;}
.mini-dot{position:absolute;width:9px;height:9px;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px currentColor;}
.insp-body{padding:4px 16px 20px;}
.insp-empty{color:var(--text3);font-size:12.5px;line-height:1.7;text-align:center;padding:24px 8px;}
.insp-head{display:flex;align-items:center;gap:12px;margin:6px 0 14px;}
.insp-ava{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#001018;}
.insp-title{font-size:19px;font-weight:800;letter-spacing:1px;}
.insp-pod{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.insp-mission{font-size:13px;color:var(--text);line-height:1.6;background:rgba(0,212,255,.05);border:1px solid var(--line2);border-radius:10px;padding:12px 13px;margin-bottom:14px;}
.insp-sec-t{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin:14px 0 7px;}
.insp-role{font-size:12.5px;color:var(--text2);line-height:1.65;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:11px;padding:4px 9px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid var(--line2);color:var(--text2);cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--accent);color:var(--text);}
.invoke{
  margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--mono);font-size:14px;font-weight:700;color:#001828;
  background:var(--accent);border-radius:9px;padding:11px;letter-spacing:.5px;
  box-shadow:0 0 22px rgba(0,212,255,.28);
}
/* ── Event log ── */
.eventbar{
  height:150px;flex:0 0 150px;border-top:1px solid var(--line);background:var(--bg2);
  display:flex;flex-direction:column;
}
.ev-tabs{display:flex;align-items:center;gap:2px;padding:0 12px;height:34px;border-bottom:1px solid var(--line);}
.ev-tab{font-size:11.5px;color:var(--text3);padding:0 12px;height:34px;line-height:34px;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.5px;}
.ev-tab.on{color:var(--text);border-bottom-color:var(--accent);}
.ev-spacer{flex:1;}
.ev-count{font-size:10px;background:rgba(0,212,255,.14);color:var(--accent);border-radius:99px;padding:1px 7px;margin-left:6px;}
.ev-log{flex:1;overflow-y:auto;padding:8px 14px;font-family:var(--mono);font-size:11.5px;line-height:1.85;}
.ev-line{display:flex;gap:10px;opacity:0;animation:evin .3s forwards;}
@keyframes evin{to{opacity:1;}}
.ev-time{color:var(--text3);flex-shrink:0;}
.ev-agent{font-weight:700;flex-shrink:0;width:78px;}
.ev-tag{flex-shrink:0;width:64px;}
.ev-ok{color:var(--salvia);} .ev-info{color:var(--text2);} .ev-warn{color:var(--champagne);}
.ev-msg{color:var(--text2);}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:rgba(120,190,220,.15);border-radius:5px;}
::-webkit-scrollbar-track{background:transparent;}
@media(max-width:1100px){ .inspector{display:none;} }
@media(max-width:820px){ .sidebar{display:none;} }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg class="star" width="20" height="20" viewBox="0 0 100 100"><polygon points="50,5 59.5,40.5 95,50 59.5,59.5 50,95 40.5,59.5 5,50 40.5,40.5" fill="#00D4FF"/></svg>
    <div><div class="brand-name">VELUM STUDIO</div><div class="brand-sub">Sistema de Agentes</div></div>
  </div>
  <div class="cmd">
    <span class="ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input id="search" placeholder="Busca un agente o pod…" autocomplete="off"/>
    <span class="kbd">⌘K</span>
  </div>
  <div class="status-chip"><span class="dot"></span> 13 agentes · Conectado</div>
</div>

<div class="body">
  <!-- Sidebar / Explorer -->
  <div class="sidebar">
    <div class="side-h"><span>EQUIPO</span><span id="sideCount">13</span></div>
    <div id="sideList"></div>
  </div>

  <!-- Stage -->
  <div class="stage-wrap">
    <div class="stage" id="stage">
      <svg id="floorSvg" width="820" height="520" viewBox="0 0 820 520"></svg>
    </div>
  </div>

  <!-- Inspector -->
  <div class="inspector">
    <div class="mini">
      <div class="mini-h"><span>Mapa del estudio</span><span id="miniActive">6 activos</span></div>
      <div class="mini-map" id="miniMap"></div>
    </div>
    <div class="insp-body" id="inspector">
      <div class="insp-empty">Selecciona un agente en la oficina o en el panel izquierdo para ver su misión, su rol y cómo invocarlo.</div>
    </div>
  </div>
</div>

<!-- Event log -->
<div class="eventbar">
  <div class="ev-tabs">
    <div class="ev-tab on">EVENT LOG</div>
    <div class="ev-tab">OUTPUT</div>
    <div class="ev-tab">PROBLEMS <span class="ev-count">0</span></div>
    <div class="ev-spacer"></div>
    <div class="ev-tab" style="border:none;color:var(--text3);">VELUM Studio · en vivo</div>
  </div>
  <div class="ev-log" id="evLog"></div>
</div>

<script>
const POD_COLORS = {
  'Coordinación':'#00D4FF', 'Plataforma':'#FF8A3D', 'Crecimiento':'#5EC8B0',
  'Marca & Web':'#8FA9FF', 'Cliente & Confianza':'#C9A86A'
};
// col,row en una rejilla ~0..8 para la proyección isométrica
const AGENTS = [
  {id:'nucleo',   name:'NÚCLEO',   pod:'Coordinación',  color:'#00D4FF', c:4.0,r:4.0, status:'active', nuevo:false,
    mission:'Jefe de staff: lleva el tablero, prioriza P0/P1/P2, reparte trabajo al agente correcto y sintetiza.',
    role:'Primer agente que habla cuando llegas. Da el pulso, prioriza sin piedad, orquesta a los demás y mantiene el tablero. No ejecuta trabajo profundo — coordina.',
    with:['FORJA','CAUDAL','ORÁCULO','todos']},
  {id:'forja',    name:'FORJA',    pod:'Plataforma',    color:'#FF8A3D', c:2.7,r:0.7, status:'active', nuevo:false,
    mission:'Producto & sistema interno: panel, DB, edge functions, migraciones, lógica de negocio.',
    role:'Ingeniero de producto. Lee el código real antes de cambiar, cambios pequeños y verificables (node --check), multi-tenant primero. El www es artefacto.',
    with:['CAUDAL','ESCUDO','CENTINELA','TRAZO']},
  {id:'caudal',   name:'CAUDAL',   pod:'Plataforma',    color:'#3DD6A0', c:1.4,r:1.5, status:'active', nuevo:true,
    mission:'El dinero: Stripe Connect, domiciliación, SaaS billing, dunning, conciliación, CFDI.',
    role:'Idempotencia siempre, registra el monto real cobrado, valida firmas con anti-replay, piensa el dunning como recuperación de ingresos. "Lo registrado = lo cobrado".',
    with:['FORJA','ESCUDO','ORÁCULO','CENTINELA']},
  {id:'aura',     name:'AURA',     pod:'Plataforma',    color:'#B98CFF', c:4.1,r:0.3, status:'idle', nuevo:true,
    mission:'IA & asistentes: Aura, VELUM Assistant, coach-IA, storefront-chat. Calidad y costo.',
    role:'Cuida que la IA sea útil, con voz de marca y barata. Aislamiento por gym, grounding real (no inventa), prompts versionados y medidos.',
    with:['FORJA','CAUDAL','APOYO','ORÁCULO']},
  {id:'centinela',name:'CENTINELA',pod:'Plataforma',    color:'#FF5C6C', c:0.3,r:3.7, status:'active', nuevo:true,
    mission:'QA & confiabilidad: rompe el sistema antes que los usuarios. Verifica antes de deploy.',
    role:'Modo adversario (acentos, día 31, webhook duplicado, multi-tenant). Reproduce el bug real, verifica con evidencia. Tiene veto informal.',
    with:['FORJA','CAUDAL','AURA','SEÑAL']},
  {id:'senal',    name:'SEÑAL',    pod:'Plataforma',    color:'#33B5FF', c:0.9,r:2.5, status:'idle', nuevo:false,
    mission:'App nativa: Capacitor, builds, App Store, Google Play, assets, push.',
    role:'Lleva la app del código a las tiendas. El www es artefacto, versionCode sube siempre, lee logcat para crashes nativos, keystore es de Roy.',
    with:['FORJA','CENTINELA','TRAZO']},
  {id:'impulso',  name:'IMPULSO',  pod:'Crecimiento',   color:'#5EC8B0', c:5.6,r:0.5, status:'active', nuevo:false,
    mission:'Growth, pricing, funnel self-serve, ventas, conversión, referidos.',
    role:'Convierte el producto en negocio. El onboarding self-serve ya existe; mide fricción del embudo, afina planes y guion.',
    with:['VITRINA','VOZ','CAUDAL','ORÁCULO']},
  {id:'oraculo',  name:'ORÁCULO',  pod:'Crecimiento',   color:'#2FE0D0', c:7.5,r:2.7, status:'idle', nuevo:true,
    mission:'Datos & BI: MRR, churn, LTV, cohortes, activación, analítica del gym, experimentos.',
    role:'Nadie decide a ojo. Define la métrica antes de reportarla, multi-tenant en cada query, distingue MRR de VELUM vs ingresos del gym.',
    with:['IMPULSO','CAUDAL','AURA','NÚCLEO']},
  {id:'voz',      name:'VOZ',      pod:'Crecimiento',   color:'#FF7AD9', c:6.7,r:1.4, status:'idle', nuevo:false,
    mission:'Marketing & redes: contenido, campañas, copy de captación, lanzamiento.',
    role:'Pone a sonar a VELUM. Le habla a DUEÑOS de gym, muestra el producto real, cada pieza lleva a un CTA medible.',
    with:['VITRINA','IMPULSO','TRAZO']},
  {id:'vitrina',  name:'VITRINA',  pod:'Marca & Web',   color:'#8FA9FF', c:6.3,r:4.9, status:'active', nuevo:false,
    mission:'Landing, storefront público, SEO, web de cara al cliente.',
    role:'Hace que la web venda y se vea profesional. Storefront multi-tenant, SEO real, mobile-first, formularios endurecidos.',
    with:['IMPULSO','VOZ','TRAZO','FORJA']},
  {id:'trazo',    name:'TRAZO',    pod:'Marca & Web',   color:'#C9A0FF', c:7.3,r:3.9, status:'idle', nuevo:true,
    mission:'Diseño & design system: coherencia entre las 3 apps, UX, accesibilidad, íconos SVG.',
    role:'Hace que las 3 apps se sientan UNA marca. Theming aditivo por vertical, nada de emojis, accesibilidad no opcional, premium = detalles.',
    with:['FORJA','SEÑAL','VITRINA','VOZ']},
  {id:'apoyo',    name:'APOYO',    pod:'Cliente & Confianza', color:'#7FD8C4', c:2.2,r:5.7, status:'idle', nuevo:false,
    mission:'Soporte & éxito del cliente: onboarding, centro de ayuda, retención, churn.',
    role:'Hace que los gyms se queden. Reduce el tiempo-a-primer-valor, documenta con capturas reales, convierte fricciones en mejoras de producto.',
    with:['AURA','ORÁCULO','IMPULSO','FORJA']},
  {id:'escudo',   name:'ESCUDO',   pod:'Cliente & Confianza', color:'#9FB4C9', c:0.7,r:5.2, status:'active', nuevo:false,
    mission:'Seguridad: RLS, multi-tenant, auth, compliance, fugas de datos entre gyms.',
    role:'Protege que cada gym solo toque lo suyo. Asume hostilidad, verifica con claims simulados, cuida policies y secretos (de Roy).',
    with:['FORJA','CAUDAL','AURA','CENTINELA']},
];

// ── Isometric projection ──
const TW=104, TH=52, OX=410, OY=250; // origin dentro del viewBox 820x520
const iso = (c,r)=>({ x: OX + (c-r)*(TW/2), y: OY + (c+r)*(TH/2) });

// ── Draw floor (SVG) ──
const svg = document.getElementById('floorSvg');
const SVGNS='http://www.w3.org/2000/svg';
function tile(c,r,fill,stroke,op){
  const p=document.createElementNS(SVGNS,'polygon');
  const a=iso(c,r), b=iso(c+1,r), d=iso(c+1,r+1), e=iso(c,r+1);
  p.setAttribute('points',`${a.x},${a.y} ${b.x},${b.y} ${d.x},${d.y} ${e.x},${e.y}`);
  p.setAttribute('fill',fill); if(stroke){p.setAttribute('stroke',stroke);p.setAttribute('stroke-width','1');}
  if(op!=null)p.setAttribute('opacity',op);
  svg.appendChild(p);
}
// base floor grid 0..8
const N=8;
for(let c=0;c<N;c++)for(let r=0;r<N;r++){
  const light = (c+r)%2===0;
  tile(c,r, light?'rgba(220,240,255,.05)':'rgba(180,215,235,.03)','rgba(120,190,220,.08)');
}
// pod zones (translucent color patches)
const ZONES=[
  {pod:'Plataforma',        cells:[[0,1],[1,1],[2,1],[3,0],[0,2],[1,2],[2,2],[0,3],[1,3],[2,3],[0,4],[1,4]]},
  {pod:'Crecimiento',       cells:[[5,0],[6,0],[7,0],[5,1],[6,1],[7,1],[5,2],[6,2],[7,2],[7,3]]},
  {pod:'Marca & Web',       cells:[[6,4],[7,4],[6,5],[7,5],[6,6],[7,6],[5,6],[7,3]]},
  {pod:'Cliente & Confianza',cells:[[0,5],[1,5],[2,5],[0,6],[1,6],[2,6],[1,7],[2,7],[0,7]]},
];
ZONES.forEach(z=>{ z.cells.forEach(([c,r])=>tile(c,r, POD_COLORS[z.pod], null, .10)); });
// central dais for NÚCLEO
[[3,3],[4,3],[3,4],[4,4]].forEach(([c,r])=>tile(c,r,'rgba(0,212,255,.18)','rgba(0,212,255,.4)',1));

// zone labels
function zoneLabel(cells,pod){
  let sx=0,sy=0; cells.forEach(([c,r])=>{const p=iso(c+.5,r+.5);sx+=p.x;sy+=p.y;});
  const t=document.createElementNS(SVGNS,'text');
  t.setAttribute('x',sx/cells.length); t.setAttribute('y', sy/cells.length);
  t.setAttribute('text-anchor','middle'); t.setAttribute('fill',POD_COLORS[pod]);
  t.setAttribute('font-size','10'); t.setAttribute('font-weight','800');
  t.setAttribute('letter-spacing','1.5'); t.setAttribute('opacity','.5');
  t.setAttribute('font-family','Inter,sans-serif'); t.style.textTransform='uppercase';
  t.textContent=pod.toUpperCase();
  svg.appendChild(t);
}
ZONES.forEach(z=>zoneLabel(z.cells,z.pod));

// ── Place avatars ──
const STATUS_COLOR={active:'#5EC8B0', idle:'#C9A86A', off:'#4A6B7C'};
const stage=document.getElementById('stage');
const floorRect=()=>svg.getBoundingClientRect();
function placeAvatars(){
  document.querySelectorAll('.avatar').forEach(a=>a.remove());
  const fr=svg.getBoundingClientRect(), wr=stage.getBoundingClientRect();
  const sx=fr.width/820, sy=fr.height/520;
  AGENTS.forEach(a=>{
    const p=iso(a.c+.5,a.r+.5);
    const left=(fr.left-wr.left)+p.x*sx;
    const top=(fr.top-wr.top)+p.y*sy;
    const el=document.createElement('div');
    el.className='avatar'; el.dataset.id=a.id;
    el.style.left=left+'px'; el.style.top=top+'px';
    el.innerHTML=`
      <div class="bot" style="color:${a.color}">
        <div class="halo" style="background:${a.color}"></div>
        <div class="shadow"></div>
        <div class="ant"></div>
        <div class="body"></div>
        <div class="visor"><span class="eye"></span><span class="eye"></span></div>
        <div class="av-status" style="background:${STATUS_COLOR[a.status]}"></div>
      </div>
      <div class="av-tag"><span class="an" style="color:${a.color}">${a.name}</span><span class="ar">${a.pod}</span></div>`;
    el.onclick=()=>selectAgent(a.id);
    stage.appendChild(el);
  });
  syncSel();
}

// ── Sidebar ──
const sideList=document.getElementById('sideList');
function buildSidebar(filter=''){
  sideList.innerHTML='';
  const pods=[...new Set(AGENTS.map(a=>a.pod))];
  let shown=0;
  pods.forEach(pod=>{
    const items=AGENTS.filter(a=>a.pod===pod && (a.name.toLowerCase().includes(filter)||pod.toLowerCase().includes(filter)));
    if(!items.length)return;
    const g=document.createElement('div');g.className='pod-group';
    g.innerHTML=`<div class="pod-label"><span class="pod-swatch" style="background:${POD_COLORS[pod]}"></span>${pod}</div>`;
    items.forEach(a=>{
      shown++;
      const row=document.createElement('div');
      row.className='agent-row'; row.dataset.id=a.id;
      row.innerHTML=`<span class="rd" style="background:${a.color}"></span><span class="rname">${a.name}</span>${a.nuevo?'<span class="rnew">NUEVO</span>':''}`;
      row.onclick=()=>selectAgent(a.id);
      g.appendChild(row);
    });
    sideList.appendChild(g);
  });
  document.getElementById('sideCount').textContent=shown;
}

// ── Minimap ──
const miniMap=document.getElementById('miniMap');
function buildMini(){
  miniMap.innerHTML='';
  AGENTS.forEach(a=>{
    const p=iso(a.c+.5,a.r+.5);
    const d=document.createElement('div');d.className='mini-dot';d.dataset.id=a.id;
    d.style.left=(p.x/820*100)+'%'; d.style.top=(p.y/520*100)+'%';
    d.style.background=a.color; d.style.color=a.color;
    d.onclick=()=>selectAgent(a.id);
    miniMap.appendChild(d);
  });
}

// ── Selection / inspector ──
let selId=null;
function syncSel(){
  document.querySelectorAll('.avatar').forEach(e=>e.classList.toggle('sel',e.dataset.id===selId));
  document.querySelectorAll('.agent-row').forEach(e=>e.classList.toggle('active',e.dataset.id===selId));
  document.querySelectorAll('.mini-dot').forEach(e=>{e.style.width=e.dataset.id===selId?'13px':'9px';e.style.height=e.dataset.id===selId?'13px':'9px';});
}
function selectAgent(id){
  selId=id; const a=AGENTS.find(x=>x.id===id); if(!a)return;
  const insp=document.getElementById('inspector');
  insp.innerHTML=`
    <div class="insp-head">
      <div class="insp-ava" style="background:${a.color}">${a.name[0]}</div>
      <div><div class="insp-title" style="color:${a.color}">${a.name}</div>
      <div class="insp-pod">${a.pod}${a.nuevo?' · nuevo':''} · <span style="color:${STATUS_COLOR[a.status]}">${a.status==='active'?'activo':a.status==='idle'?'en espera':'off'}</span></div></div>
    </div>
    <div class="insp-mission">${a.mission}</div>
    <div class="insp-sec-t">Cómo trabaja</div>
    <div class="insp-role">${a.role}</div>
    <div class="insp-sec-t">Colabora con</div>
    <div class="chip-row">${a.with.map(w=>`<span class="chip" data-w="${w}">${w}</span>`).join('')}</div>
    <div class="invoke">/${a.id}</div>`;
  insp.querySelectorAll('.chip[data-w]').forEach(ch=>{
    ch.onclick=()=>{const t=AGENTS.find(x=>x.name===ch.dataset.w); if(t)selectAgent(t.id);};
  });
  syncSel();
}

// ── Event log ticker ──
const evLog=document.getElementById('evLog');
const EV_SAMPLES=[
  ['centinela','OK','caminos críticos verdes — login/reserva/cobro OK'],
  ['caudal','INFO','webhook idempotente: 1 pago registrado, 0 duplicados'],
  ['forja','OK','edge fn desplegada (Deno.serve) · sin errores'],
  ['oraculo','INFO','MRR consultado · churn semana 2 en observación'],
  ['aura','INFO','prompt de Aura evaluado · costo/conversación estable'],
  ['escudo','OK','aislamiento gym verificado — sin fugas'],
  ['senal','INFO','build v4 · versionCode +1 · fix incluido'],
  ['trazo','WARN','2 componentes divergen entre panel y storefront'],
  ['impulso','INFO','funnel self-serve activo · trial 7 días'],
  ['vitrina','OK','storefront /g/{slug} · SEO + OG listos'],
  ['nucleo','INFO','tablero actualizado · 2 P0 cerrados hoy'],
  ['apoyo','INFO','onboarding wizard 4/5 pasos en gyms nuevos'],
  ['voz','INFO','pieza de lanzamiento → CTA registro.html'],
];
let ei=0;
function pushEvent(){
  const [ag,tag,msg]=EV_SAMPLES[ei%EV_SAMPLES.length]; ei++;
  const a=AGENTS.find(x=>x.id===ag);
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0'), ss=String(now.getSeconds()).padStart(2,'0');
  const cls=tag==='OK'?'ev-ok':tag==='WARN'?'ev-warn':'ev-info';
  const line=document.createElement('div');line.className='ev-line';
  line.innerHTML=`<span class="ev-time">${hh}:${mm}:${ss}</span><span class="ev-agent" style="color:${a.color}">${a.name.toLowerCase()}</span><span class="ev-tag ${cls}">[${tag}]</span><span class="ev-msg">${msg}</span>`;
  evLog.appendChild(line);
  while(evLog.children.length>40)evLog.removeChild(evLog.firstChild);
  evLog.scrollTop=evLog.scrollHeight;
}

// ── Search ──
document.getElementById('search').addEventListener('input',e=>{
  const f=e.target.value.toLowerCase().trim();
  buildSidebar(f);
  document.querySelectorAll('.avatar').forEach(el=>{
    const a=AGENTS.find(x=>x.id===el.dataset.id);
    const hit=!f||a.name.toLowerCase().includes(f)||a.pod.toLowerCase().includes(f);
    el.style.opacity=hit?'1':'.18'; el.style.filter=hit?'':'grayscale(.6)';
  });
});
document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('search').focus();} });

// ── Init ──
function init(){ buildSidebar(); buildMini(); placeAvatars(); selectAgent('nucleo'); }
init();
window.addEventListener('resize',()=>{ clearTimeout(window._rt); window._rt=setTimeout(placeAvatars,120); });
for(let i=0;i<8;i++)pushEvent();
setInterval(pushEvent,2600);
</script>
