<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Página no encontrada — VELUM</title>
<meta name="robots" content="noindex"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--accent:#1D9E75;--accent-light:#5DCAA5;--bg:#06100d;--text:#e8edf5;--text2:#9DC8BB;--text3:#4a7265;--font:'Inter',system-ui,sans-serif;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(29,158,117,.12),transparent);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:48px;text-decoration:none;}
.logo-word{font-size:18px;font-weight:800;letter-spacing:5px;color:#fff;}
.code{font-size:clamp(80px,15vw,140px);font-weight:900;color:transparent;background:linear-gradient(135deg,var(--accent),var(--accent-light));-webkit-background-clip:text;background-clip:text;line-height:1;letter-spacing:-4px;margin-bottom:16px;}
h1{font-size:clamp(20px,3vw,28px);font-weight:800;color:#fff;margin-bottom:10px;text-align:center;}
p{font-size:15px;color:var(--text2);line-height:1.7;text-align:center;max-width:440px;margin-bottom:36px;}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn-primary{padding:13px 28px;background:var(--accent);color:#fff;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;transition:background .2s;}
.btn-primary:hover{background:var(--accent-light);}
.btn-ghost{padding:13px 28px;background:transparent;color:var(--text2);border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent-light);}
.links{margin-top:40px;display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.links a{font-size:13px;color:var(--text3);text-decoration:none;transition:color .2s;}
.links a:hover{color:var(--accent-light);}
</style>
</head>
<body>
<a class="logo" href="/">
  <svg width="18" height="22" viewBox="0 0 18 22"><polygon points="9,1 3,20 9,16 15,20" fill="#5DCAA5"/><polygon points="9,1 15,20 9,16 3,20" fill="#1D9E75" opacity=".55"/><circle cx="9" cy="10" r="1.5" fill="#041710"/></svg>
  <span class="logo-word">VELUM</span>
</a>

<div class="code">404</div>
<h1>Esta página no existe</h1>
<p>El link que seguiste está roto o la página fue movida. Pero tu gym sí existe — regresa al inicio y sigue gestionando.</p>

<div class="btn-group">
  <a href="/" class="btn-primary">← Volver al inicio</a>
  <a href="/app" class="btn-ghost">Ir al sistema →</a>
</div>

<div class="links">
  <a href="/#features">Funciones</a>
  <a href="/#pricing">Precios</a>
  <a href="/#faq">FAQ</a>
  <a href="/registro">Registrarse</a>
  <a href="mailto:soporte@myvelum.app">Soporte</a>
</div>
</body>
</html>
