<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VELUM — Página no encontrada</title>
<meta name="robots" content="noindex"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --accent:#00D4FF;--accent2:#00D4FF;
  --bg:#06100d;
  --text:#e8edf5;--text2:#9DC8BB;--text3:#4a7265;
  --font:'Inter',system-ui,sans-serif;
}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% -5%,rgba(0,212,255,.13),transparent),
    radial-gradient(ellipse 40% 30% at 80% 80%,rgba(0,212,255,.05),transparent);
}
.card{
  text-align:center;max-width:460px;width:100%;
  background:rgba(12,30,24,.92);border:1px solid rgba(0,212,255,.2);
  border-radius:20px;padding:52px 40px 44px;
  box-shadow:0 32px 80px rgba(0,0,0,.55);
}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;}
.logo-word{font-size:20px;font-weight:800;letter-spacing:5px;color:#fff;}
.code{
  font-size:88px;font-weight:900;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;letter-spacing:-4px;margin-bottom:16px;
}
h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:10px;}
p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:32px;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--accent);color:#001A1F;text-decoration:none;
  padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;
  box-shadow:0 0 24px rgba(0,212,255,.3);transition:background .2s;
}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.06);color:var(--text2);text-decoration:none;
  padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;
  border:1px solid rgba(255,255,255,.1);transition:all .2s;
}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2);}
.help{margin-top:28px;font-size:11px;color:var(--text3);}
.help a{color:var(--accent2);text-decoration:none;}
.help a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 100 100">
  <polygon points="50,5 59.55,40.45 95,50 59.55,59.55 50,95 40.45,59.55 5,50 40.45,40.45" fill="#00D4FF"/>
</svg>
    <div class="logo-word">VELUM</div>
  </div>

  <div class="code">404</div>
  <h1>Página no encontrada</h1>
  <p>El enlace que seguiste no existe o fue movido.<br>No te preocupes — tu gym sigue funcionando perfectamente.</p>

  <div class="btns">
    <a href="/" class="btn-primary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Ir al inicio
    </a>
    <a href="/app" class="btn-ghost">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Entrar al sistema
    </a>
  </div>

  <div class="help">
    ¿Necesitas ayuda? <a href="https://wa.me/524613642990?text=Tengo+una+duda+sobre+VELUM" target="_blank">Escríbenos por WhatsApp →</a>
  </div>
</div>
</body>
</html>
