<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VELUM — ¡Pago exitoso!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#06100d;color:#e8edf5;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(29,158,117,.15),transparent);
}
.card{background:rgba(12,30,24,.95);border:1px solid rgba(29,158,117,.25);border-radius:20px;padding:48px 40px;max-width:480px;width:100%;text-align:center;}
.icon{font-size:64px;margin-bottom:20px;animation:bounce .6s ease;}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
h1{font-size:28px;font-weight:800;color:#fff;margin-bottom:10px;}
p{font-size:15px;color:#9DC8BB;line-height:1.7;margin-bottom:28px;}
.btn{
  display:inline-block;background:#1D9E75;color:#fff;
  text-decoration:none;border-radius:12px;padding:14px 32px;
  font-size:15px;font-weight:700;box-shadow:0 0 30px rgba(29,158,117,.3);
  transition:background .2s;
}
.btn:hover{background:#5DCAA5;}
.note{font-size:11px;color:#4a7265;margin-top:20px;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>¡Bienvenido a VELUM!</h1>
  <p>Tu pago fue procesado correctamente. Revisa tu email — en unos minutos recibirás la confirmación con tus datos de acceso.</p>
  <a href="MOVE_Sistema_Interno.html" class="btn">Acceder a mi cuenta →</a>
  <div class="note">
    Si aún no recibes el email en 5 minutos, revisa tu carpeta de spam.<br>
    ¿Problemas? Escríbenos a soporte@myvelum.app
  </div>
</div>
<script>
// Confetti sencillo
const colors=['#1D9E75','#5DCAA5','#fff','#C4922A','#10e8a0'];
for(let i=0;i<50;i++){
  const p=document.createElement('div');
  p.style.cssText=`position:fixed;width:8px;height:8px;border-radius:2px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    left:${Math.random()*100}vw;top:-10px;
    animation:fall ${1.5+Math.random()*2}s linear ${Math.random()*2}s forwards;
    pointer-events:none;z-index:9999;`;
  document.body.appendChild(p);
}
const st=document.createElement('style');
st.textContent='@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}';
document.head.appendChild(st);
</script>
</body>
</html>
