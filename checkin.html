<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>VELUM — Check-in</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --accent:#00D4FF;
  --accent-ink:#003544;
  --ok:#34C759;
  --warn:#FF9F0A;
  --danger:#FF3B30;
  --bg:#F5F5F7;
  --surface:#FFFFFF;
  --ink:#1D1D1F;
  --ink2:#6E6E73;
  --ink3:#AEAEB2;
  --hair:rgba(0,0,0,.07);
  --shadow:0 1px 2px rgba(0,0,0,.04),0 12px 40px rgba(0,0,0,.08);
  --shadow-sm:0 1px 2px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.06);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Inter',system-ui,sans-serif;
}
html,body{height:100%;}
body{
  font-family:var(--font);background:var(--bg);color:var(--ink);
  min-height:100dvh;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overflow:hidden;
  background-image:
    radial-gradient(1200px 700px at 50% -20%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 70%);
}
/* Brand bar */
.brandbar{
  position:fixed;top:0;left:0;right:0;z-index:5;
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(16px,3.5vh,30px) clamp(20px,4vw,46px);
  padding-top:calc(clamp(16px,3.5vh,30px) + env(safe-area-inset-top,0px));
}
.brand{display:flex;align-items:center;gap:11px;min-width:0;}
.brand-mark{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--ink);color:#fff;font-weight:800;font-size:17px;letter-spacing:-.5px;
  box-shadow:var(--shadow-sm);overflow:hidden;
}
.brand-mark img{width:100%;height:100%;object-fit:cover;}
.brand-name{font-size:17px;font-weight:700;letter-spacing:.2px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.brand-right{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--ink3);font-variant-numeric:tabular-nums;}
.brand-right .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px color-mix(in srgb,var(--ok) 18%,transparent);}

/* Stage */
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:clamp(80px,12vh,120px) 20px 40px;width:100%;}
.screen{width:100%;max-width:460px;animation:rise .5s cubic-bezier(.16,1,.3,1);}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.99);}to{opacity:1;transform:none;}}

/* ── Idle / kiosco ── */
.eyebrow{font-size:13px;font-weight:600;letter-spacing:.3px;color:var(--ink3);text-align:center;margin-bottom:8px;}
.headline{font-size:clamp(30px,5vw,42px);font-weight:800;letter-spacing:-1.2px;line-height:1.04;text-align:center;color:var(--ink);margin-bottom:6px;}
.subhead{font-size:15px;color:var(--ink2);text-align:center;margin-bottom:clamp(22px,4vh,34px);line-height:1.45;}
.num-display{
  height:74px;border-radius:20px;background:var(--surface);box-shadow:var(--shadow-sm);
  display:flex;align-items:center;justify-content:center;gap:2px;margin-bottom:16px;position:relative;
  font-size:34px;font-weight:700;letter-spacing:6px;color:var(--ink);font-variant-numeric:tabular-nums;
  transition:box-shadow .2s;
}
.num-display.filled{box-shadow:0 0 0 2px var(--accent),var(--shadow-sm);}
.num-display .ph{color:var(--ink3);font-weight:600;letter-spacing:.2px;font-size:17px;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(9px,1.6vh,13px);margin-bottom:16px;}
.key{
  height:clamp(58px,8.2vh,72px);border-radius:18px;border:none;
  background:var(--surface);box-shadow:var(--shadow-sm);
  font-family:var(--font);font-size:26px;font-weight:600;color:var(--ink);
  cursor:pointer;transition:transform .09s ease,background .12s;user-select:none;
  display:flex;align-items:center;justify-content:center;
}
.key:active{transform:scale(.95);background:#fff;}
.key.tint:active{background:color-mix(in srgb,var(--accent) 12%,#fff);}
.key svg{width:26px;height:26px;stroke:var(--ink2);}
.key-0{grid-column:2;}
.cta{
  width:100%;height:60px;border-radius:18px;border:none;cursor:pointer;
  background:var(--accent);color:var(--accent-ink);
  font-family:var(--font);font-size:17px;font-weight:700;letter-spacing:.2px;
  box-shadow:0 8px 24px color-mix(in srgb,var(--accent) 34%,transparent);
  transition:transform .12s,filter .2s,opacity .2s;
  display:flex;align-items:center;justify-content:center;gap:9px;
}
.cta:active{transform:scale(.985);filter:brightness(.97);}
.cta:disabled{opacity:.55;box-shadow:none;cursor:default;}
.cta svg{width:20px;height:20px;stroke:currentColor;}
.qr-hint{margin-top:22px;display:flex;align-items:center;justify-content:center;gap:9px;font-size:13px;color:var(--ink3);}
.qr-hint svg{width:18px;height:18px;stroke:var(--ink3);flex-shrink:0;}
.inline-err{
  font-size:13.5px;font-weight:600;color:var(--danger);text-align:center;
  margin:-4px 0 14px;height:0;overflow:hidden;opacity:0;transition:opacity .2s,height .2s;
}
.inline-err.show{height:auto;opacity:1;margin:2px 0 14px;}

/* ── Result ── */
.result{text-align:center;}
.medallion{
  width:clamp(104px,17vh,132px);height:clamp(104px,17vh,132px);border-radius:50%;
  margin:0 auto 26px;display:flex;align-items:center;justify-content:center;position:relative;
  background:var(--surface);box-shadow:var(--shadow);
}
.medallion::after{
  content:'';position:absolute;inset:-9px;border-radius:50%;
  border:2px solid var(--rc,var(--ok));opacity:.22;
}
.medallion svg{width:52%;height:52%;stroke:var(--rc,var(--ok));stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.medallion .draw{stroke-dasharray:48;stroke-dashoffset:0;animation:draw .6s .1s cubic-bezier(.65,0,.35,1);}
@keyframes draw{from{stroke-dashoffset:48;}to{stroke-dashoffset:0;}}
.medallion.pop{animation:pop .5s cubic-bezier(.16,1.3,.4,1);}
@keyframes pop{from{transform:scale(.86);opacity:0;}to{transform:none;opacity:1;}}
.pill{
  display:inline-flex;align-items:center;gap:7px;padding:7px 15px;border-radius:50px;
  font-size:13px;font-weight:700;letter-spacing:.2px;margin-bottom:16px;
  background:color-mix(in srgb,var(--rc,var(--ok)) 12%,transparent);color:var(--rc,var(--ok));
}
.pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
.member{font-size:clamp(30px,5.2vw,44px);font-weight:800;letter-spacing:-1.3px;line-height:1.02;color:var(--ink);margin-bottom:6px;}
.member-sub{font-size:15px;color:var(--ink2);margin-bottom:clamp(20px,3.6vh,30px);}
.facts{background:var(--surface);border-radius:20px;box-shadow:var(--shadow-sm);padding:6px 18px;text-align:left;}
.fact{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid var(--hair);}
.fact:last-child{border-bottom:none;}
.fact-k{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink2);}
.fact-k svg{width:18px;height:18px;stroke:var(--ink3);flex-shrink:0;}
.fact-v{font-size:15px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;text-align:right;}
.visits{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;justify-content:center;}
.visit{display:inline-flex;align-items:center;gap:6px;background:var(--surface);box-shadow:var(--shadow-sm);border-radius:10px;padding:7px 11px;font-size:12px;font-weight:600;color:var(--ink2);font-variant-numeric:tabular-nums;}
.visit svg{width:13px;height:13px;stroke:var(--ink3);}
.resetbar{margin-top:26px;height:4px;border-radius:99px;background:var(--hair);overflow:hidden;}
.resetfill{height:100%;width:100%;border-radius:99px;background:var(--rc,var(--accent));}
.reset-note{font-size:12px;color:var(--ink3);margin-top:10px;}

/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;gap:18px;}
.spinner{width:44px;height:44px;border-radius:50%;border:3px solid var(--hair);border-top-color:var(--accent);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading .lt{font-size:15px;color:var(--ink2);font-weight:500;}

/* Dark auto (por si el gym usa pantalla oscura) — opcional, respeta preferencia del dispositivo */
@media (prefers-color-scheme: dark){
  :root{
    --bg:#000000;--surface:#1C1C1E;--ink:#F5F5F7;--ink2:#98989F;--ink3:#636366;
    --hair:rgba(255,255,255,.09);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 16px 44px rgba(0,0,0,.5);
    --shadow-sm:0 1px 2px rgba(0,0,0,.3),0 6px 18px rgba(0,0,0,.35);
  }
  .key:active{background:#2C2C2E;}
}
</style>
<script src="/cookie-banner.js" defer></script>
</head>
<body>
  <div class="brandbar">
    <div class="brand">
      <div class="brand-mark" id="brand-mark">V</div>
      <div class="brand-name" id="brand-name">VELUM</div>
    </div>
    <div class="brand-right"><span class="dot"></span><span id="clock">--:--</span></div>
  </div>

  <div class="stage">
    <div class="screen" id="root">
      <div class="loading"><div class="spinner"></div><div class="lt">Preparando…</div></div>
    </div>
  </div>

<script>
const CHECKIN_URL  = 'https://savzjanpydyjtrgdkllx.supabase.co/functions/v1/move-checkin';
const SUPABASE_URL = 'https://savzjanpydyjtrgdkllx.supabase.co';
const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhdnpqYW5weWR5anRyZ2RrbGx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTAxNDQsImV4cCI6MjA5MTE2NjE0NH0.j2tHPh78lRRDhWokQyrDE3Jt1BUhvXK1Oqj_Kpy4ZGE';

let resetTimer  = null;
let kioscoGymId = null;
let gymBrand    = { nombre:'VELUM', color:'#00D4FF', logo:'' };

/* ── SVG icons (sin emojis) ── */
const IC = {
  check:'<path class="draw" d="M20 6 9 17l-5-5"/>',
  warn:'<path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  denied:'<circle cx="12" cy="12" r="9"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>',
  cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  box:'<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>',
  qr:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 21v.01M17 21h.01M21 17h.01"/>',
  del:'<path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Z"/><path d="m18 9-6 6M12 9l6 6"/>',
  arrow:'<path d="M5 12h14"/><path d="m13 6 6 6-6 6"/>'
};
function svg(name, cls){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"${cls?` class="${cls}"`:''}>${IC[name]}</svg>`; }

/* ── Helpers ── */
function fmt(dateStr){ if(!dateStr) return '—'; const d=new Date(dateStr+'T12:00:00'); return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(t){ if(!t) return ''; const s=t.toLowerCase(); if(s.includes('am')||s.includes('pm')) return t.toUpperCase(); const [h,m]=t.split(':'); const hr=parseInt(h); return `${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`; }
function daysUntil(dateStr){ if(!dateStr) return null; const d=new Date(dateStr+'T12:00:00'); return Math.round((d-new Date())/(1000*60*60*24)); }
function firstName(n){ return (n||'').trim().split(/\s+/)[0]||n||''; }

/* ── Reloj ambiental ── */
function tickClock(){ const el=document.getElementById('clock'); if(el){ const d=new Date(); el.textContent=d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:true}).toUpperCase(); } }
setInterval(tickClock,1000); tickClock();

/* ── Gym brand loader ── */
async function loadGymBrand(gymId){
  if(!gymId) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/gym_config?gym_id=eq.${gymId}&select=key,value`,{ headers:{ 'apikey':ANON_KEY,'Authorization':'Bearer '+ANON_KEY } });
    if(!res.ok) return;
    const rows = await res.json(); if(!rows.length) return;
    const cfg = {}; rows.forEach(r=>cfg[r.key]=r.value);
    gymBrand.nombre = cfg.gym_nombre || gymBrand.nombre;
    gymBrand.color  = cfg.gym_color  || gymBrand.color;
    gymBrand.logo   = cfg.gym_logo_url|| '';
    document.documentElement.style.setProperty('--accent', gymBrand.color);
    // Ink de contraste para texto sobre el botón de acento
    document.documentElement.style.setProperty('--accent-ink', _contrastInk(gymBrand.color));
    const mark = document.getElementById('brand-mark');
    const nameEl = document.getElementById('brand-name');
    if(mark){ mark.innerHTML = gymBrand.logo ? `<img src="${gymBrand.logo}" alt=""/>` : (gymBrand.nombre[0]||'V').toUpperCase(); if(gymBrand.logo) mark.style.background='transparent'; }
    if(nameEl) nameEl.textContent = gymBrand.nombre;
    document.title = `${gymBrand.nombre} — Check-in`;
  }catch(e){}
}
function _contrastInk(hex){
  try{ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    const L=(0.299*r+0.587*g+0.114*b)/255; return L>0.62 ? '#08313d' : '#ffffff'; }catch(e){ return '#003544'; }
}

/* ── QR check-in (token mode) ── */
async function doCheckin(token){
  try{ const res=await fetch(`${CHECKIN_URL}?token=${encodeURIComponent(token)}`); const data=await res.json();
    if(!res.ok||!data.ok){ renderError(data.error||'QR inválido'); return; } renderSuccess(data);
  }catch(e){ renderError('Error de conexión. Intenta de nuevo.'); }
}

/* ── Number check-in (kiosco mode) ── */
async function doCheckinByNumero(numero){
  numero=(numero||'').trim();
  if(!numero){ showNumErr('Ingresa tu número de cliente.'); return; }
  const btn=document.getElementById('cta'); if(btn){ btn.disabled=true; btn.innerHTML='Verificando…'; }
  hideNumErr();
  try{
    if(!kioscoGymId){ showNumErr('Kiosco sin gym configurado.'); resetCta(); return; }
    const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/kiosco_lookup`,{ method:'POST', headers:{'apikey':ANON_KEY,'Authorization':`Bearer ${ANON_KEY}`,'Content-Type':'application/json'}, body:JSON.stringify({ p_gym_id:Number(kioscoGymId), p_numero:Number(numero) }) });
    if(!res.ok){ showNumErr('Error al consultar. Intenta de nuevo.'); resetCta(); return; }
    const rows=await res.json();
    if(!Array.isArray(rows)||!rows.length){ showNumErr('Número no encontrado. Verifícalo.'); resetCta(); return; }
    const token=rows[0].qr_token;
    if(!token){ showNumErr('Este cliente no tiene acceso configurado.'); resetCta(); return; }
    const cRes=await fetch(`${CHECKIN_URL}?token=${encodeURIComponent(token)}`); const data=await cRes.json();
    if(!cRes.ok||!data.ok){ const msg=data.error||'No se pudo registrar el acceso.'; showNumErr((msg.includes('no encontrado')||msg.includes('no válido'))?'Cliente no encontrado. Verifica el número.':msg); resetCta(); return; }
    renderSuccess(data, true);
  }catch(e){ showNumErr('Error de conexión. Intenta de nuevo.'); resetCta(); }
}
function resetCta(){ const btn=document.getElementById('cta'); if(btn){ btn.disabled=false; btn.innerHTML=`Registrar entrada ${svg('arrow')}`; } }
function showNumErr(msg){ const e=document.getElementById('num-err'); if(e){ e.textContent=msg; e.classList.add('show'); } }
function hideNumErr(){ const e=document.getElementById('num-err'); if(e) e.classList.remove('show'); }

/* ── Render: success ── */
function renderSuccess(data, autoReset=false){
  const { cliente, membership_ok, already_checked_in, check_in_time, historial, paquete } = data;
  const dias = daysUntil(cliente.vence);
  let icon, rc, pill, hello;
  if(membership_ok && already_checked_in){ icon='check'; rc='var(--ok)'; pill='Ya registrado hoy'; hello=`Hola de nuevo, ${firstName(cliente.nombre)}`; }
  else if(membership_ok){ icon='check'; rc='var(--ok)'; pill='Acceso permitido'; hello=`¡Adentro, ${firstName(cliente.nombre)}!`; }
  else if(dias!==null && dias>=0 && dias<=3){ icon='warn'; rc='var(--warn)'; pill=`Vence en ${dias} día${dias!==1?'s':''}`; hello=`${firstName(cliente.nombre)}, renueva pronto`; }
  else { icon='denied'; rc='var(--danger)'; pill='Membresía vencida'; hello='Pasa a recepción'; }

  const facts = [];
  facts.push(`<div class="fact"><span class="fact-k">${svg('cal')} Vencimiento</span><span class="fact-v" style="color:${dias!==null&&dias<0?'var(--danger)':dias!==null&&dias<=7?'var(--warn)':'var(--ink)'};">${fmt(cliente.vence)}</span></div>`);
  if(check_in_time) facts.push(`<div class="fact"><span class="fact-k">${svg('clock')} Entrada de hoy</span><span class="fact-v" style="color:var(--ok);">${fmtTime(check_in_time)}</span></div>`);
  if(paquete) facts.push(`<div class="fact"><span class="fact-k">${svg('box')} Clases restantes</span><span class="fact-v" style="color:${paquete.agotado?'var(--danger)':paquete.clases_restantes<=Math.ceil(paquete.clases_totales*.2)?'var(--warn)':'var(--ink)'};">${paquete.agotado?'Agotado':paquete.clases_restantes+' de '+paquete.clases_totales}</span></div>`);

  const visits = (historial&&historial.length) ? `<div class="visits">${historial.slice(0,4).map(v=>`<span class="visit">${svg('cal')} ${fmt(v.fecha)}</span>`).join('')}</div>` : '';
  const reset = autoReset ? `<div class="resetbar"><div class="resetfill" id="reset-fill"></div></div><div class="reset-note">Listo para el siguiente</div>` : '';

  document.getElementById('root').innerHTML = `
    <div class="result" style="--rc:${rc};">
      <div class="medallion pop">${svg(icon)}</div>
      <span class="pill"><span class="dot"></span>${pill}</span>
      <div class="member">${hello}</div>
      <div class="member-sub">${cliente.membresia||cliente.nombre||'Membresía'}</div>
      <div class="facts">${facts.join('')}</div>
      ${visits}
      ${reset}
    </div>`;

  if(autoReset){ const DELAY=5000; const fill=document.getElementById('reset-fill');
    if(fill){ fill.style.transition=`width ${DELAY}ms linear`; requestAnimationFrame(()=>{ fill.style.width='0%'; }); }
    if(resetTimer) clearTimeout(resetTimer); resetTimer=setTimeout(renderKiosco,DELAY);
  }
}

/* ── Render: error ── */
function renderError(msg, autoReset=false){
  document.getElementById('root').innerHTML = `
    <div class="result" style="--rc:var(--danger);">
      <div class="medallion pop">${svg('denied')}</div>
      <span class="pill"><span class="dot"></span>Acceso no válido</span>
      <div class="member" style="font-size:clamp(24px,4vw,32px);">Escanea tu QR personal</div>
      <div class="member-sub">${msg}</div>
      ${autoReset?`<div class="resetbar"><div class="resetfill" id="reset-fill"></div></div><div class="reset-note">Volviendo…</div>`:''}
    </div>`;
  if(autoReset){ const DELAY=4000; const fill=document.getElementById('reset-fill');
    if(fill){ fill.style.transition=`width ${DELAY}ms linear`; requestAnimationFrame(()=>{ fill.style.width='0%'; }); }
    if(resetTimer) clearTimeout(resetTimer); resetTimer=setTimeout(renderKiosco,DELAY);
  }
}

/* ── Render: idle / kiosco ── */
function renderKiosco(){
  if(resetTimer){ clearTimeout(resetTimer); resetTimer=null; }
  document.getElementById('root').innerHTML = `
    <div class="eyebrow">Bienvenido a ${gymBrand.nombre}</div>
    <div class="headline">Registra tu entrada</div>
    <div class="subhead">Ingresa tu número de cliente</div>

    <div class="num-display" id="num-display"><span class="ph" id="num-ph">— — —</span></div>
    <div id="num-err" class="inline-err"></div>

    <div class="numpad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" onclick="npPress('${n}')">${n}</button>`).join('')}
      <button class="key tint" onclick="npDel()" aria-label="Borrar">${svg('del')}</button>
      <button class="key key-0" onclick="npPress('0')">0</button>
    </div>

    <button id="cta" class="cta" onclick="doCheckinByNumero(numValue())">Registrar entrada ${svg('arrow')}</button>

    <div class="qr-hint">${svg('qr')} O abre tu portal VELUM y muestra tu código QR</div>`;
}

/* ── Numpad state ── */
let _num='';
function numValue(){ return _num; }
function _renderNum(){
  const disp=document.getElementById('num-display'); const ph=document.getElementById('num-ph');
  if(!disp) return;
  if(!_num){ disp.classList.remove('filled'); disp.innerHTML='<span class="ph" id="num-ph">— — —</span>'; }
  else{ disp.classList.add('filled'); disp.textContent=_num; }
}
function npPress(d){ if(_num.length>=6) return; _num+=d; hideNumErr(); _renderNum(); }
function npDel(){ _num=_num.slice(0,-1); _renderNum(); }
// Reinicia el buffer cada vez que se muestra el kiosco
const _origKiosco=renderKiosco;
renderKiosco=function(){ _num=''; _origKiosco(); };
// Soporte de teclado físico (monitor de PC con teclado numérico)
document.addEventListener('keydown',e=>{
  if(!document.getElementById('num-display')) return;
  if(/^[0-9]$/.test(e.key)) npPress(e.key);
  else if(e.key==='Backspace') npDel();
  else if(e.key==='Enter') doCheckinByNumero(_num);
});

/* ── Init ── */
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
const kiosco = params.get('kiosko') || params.get('kiosco');
kioscoGymId  = params.get('gym_id') || params.get('gym') || null;

if(token){ doCheckin(token); }
else if(kiosco){ loadGymBrand(kioscoGymId).then(renderKiosco); }
else { renderError('QR inválido. Escanea tu código QR personal.'); }
</script>
