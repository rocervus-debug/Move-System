<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VELUM — Check-in</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080d1a;
  --accent:#00D4FF;
  --ok:#10b981;
  --danger:#ef4444;
  --warn:#f59e0b;
  --text:#e8edf5;
  --text2:#94a3b8;
  --font:'Inter',system-ui,sans-serif;
}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background-image:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(0,212,255,.15),transparent);
}
.container{width:100%;max-width:460px;text-align:center;}
.logo{display:flex;align-items:center;justify-content:center;gap:8px;font-size:22px;font-weight:900;letter-spacing:4px;color:#fff;margin-bottom:4px;}
.logo-sub{font-size:11px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}

/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;gap:16px;}
.spinner{width:48px;height:48px;border:3px solid rgba(0,212,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Card base ── */
.card{
  background:rgba(15,23,42,.97);
  border:1px solid rgba(255,255,255,.07);
  border-radius:20px;
  padding:32px 28px;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,var(--glow,rgba(0,212,255,.08)),transparent);
  pointer-events:none;
}
.status-ring{
  width:100px;height:100px;border-radius:50%;
  border:4px solid var(--ring-color,var(--accent));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:42px;
  background:var(--ring-bg,rgba(0,212,255,.08));
  box-shadow:0 0 40px var(--ring-glow,rgba(0,212,255,.2));
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 30px var(--ring-glow,rgba(0,212,255,.2));}
  50%{box-shadow:0 0 60px var(--ring-glow,rgba(0,212,255,.35));}
}
.status-badge{
  display:inline-block;padding:5px 14px;border-radius:50px;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;
}
.badge-ok   {background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25);}
.badge-warn {background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25);}
.badge-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25);}
.client-name{font-size:26px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:.5px;}
.client-plan{font-size:13px;color:var(--text2);margin-bottom:24px;}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:12px;color:var(--text2);}
.info-value{font-size:13px;font-weight:600;color:var(--text);}
.historial{margin-top:20px;text-align:left;}
.historial-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.visit-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;padding:6px 10px;font-size:11px;color:var(--text2);margin:3px;
}

/* ── Error card ── */
.error-card{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  border-radius:20px;padding:32px 28px;text-align:center;
}
.error-icon{font-size:48px;margin-bottom:16px;}
.error-title{font-size:18px;font-weight:700;color:#f87171;margin-bottom:8px;}
.error-msg{font-size:13px;color:rgba(248,113,113,.7);line-height:1.6;}

/* ── Kiosco ── */
.kiosco-card{
  background:rgba(15,23,42,.97);border:1px solid rgba(255,255,255,.07);
  border-radius:20px;padding:32px 28px;position:relative;overflow:hidden;
}
.kiosco-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(0,212,255,.07),transparent);
  pointer-events:none;
}
.kiosco-icon{font-size:52px;margin-bottom:16px;line-height:1;}
.kiosco-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;}
.kiosco-sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.5;}
.kiosco-divider{
  display:flex;align-items:center;gap:12px;margin:24px 0;
}
.kiosco-divider::before,.kiosco-divider::after{
  content:'';flex:1;height:1px;background:rgba(255,255,255,.07);
}
.kiosco-divider span{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}

/* Number input */
.num-input-wrap{position:relative;margin-bottom:12px;}
.num-input{
  width:100%;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.1);border-radius:14px;
  padding:16px 50px 16px 18px;
  font-size:22px;font-weight:700;color:#fff;
  font-family:var(--font);outline:none;text-align:center;letter-spacing:2px;
  transition:border-color .2s,background .2s,box-shadow .2s;
  -moz-appearance:textfield;
}
.num-input::-webkit-outer-spin-button,
.num-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.num-input:focus{
  border-color:var(--accent);background:rgba(255,255,255,.07);
  box-shadow:0 0 0 3px rgba(0,212,255,.15);
}
.num-input::placeholder{color:rgba(255,255,255,.18);font-size:15px;letter-spacing:0;}
.num-clear{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;
  padding:4px;opacity:.5;transition:opacity .15s;
}
.num-clear:hover{opacity:1;}

/* Numpad */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.np-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:16px 8px;font-size:20px;font-weight:700;
  color:#fff;cursor:pointer;font-family:var(--font);
  transition:background .12s,transform .08s;user-select:none;
}
.np-btn:active{background:rgba(0,212,255,.15);transform:scale(.94);}
.np-btn.np-0{grid-column:2;}
.np-btn.np-del{
  background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.15);
  color:#f87171;font-size:16px;
}
.np-btn.np-del:active{background:rgba(239,68,68,.15);}

/* Go button */
.checkin-btn{
  width:100%;padding:17px;background:var(--accent);color:#001828;border:none;
  border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;
  font-family:var(--font);letter-spacing:.3px;
  box-shadow:0 6px 24px rgba(0,212,255,.4),0 1px 0 rgba(255,255,255,.15) inset;
  transition:all .2s;position:relative;
}
.checkin-btn:hover{background:#22b886;transform:translateY(-1px);}
.checkin-btn:active{transform:scale(.98);}
.checkin-btn:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none;}

/* Error inline */
.num-err{
  font-size:12px;color:#f87171;margin:-4px 0 12px;
  background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.15);
  border-radius:8px;padding:8px 12px;display:none;
}

/* Reset bar */
.reset-bar{
  margin-top:20px;height:3px;background:rgba(255,255,255,.06);
  border-radius:99px;overflow:hidden;
}
.reset-fill{
  height:100%;background:var(--accent);border-radius:99px;
  width:100%;transition:width linear;
}
.reset-hint{font-size:11px;color:rgba(255,255,255,.2);margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg width="14" height="14" viewBox="0 0 100 100">
  <polygon points="50,5 59.55,40.45 95,50 59.55,59.55 50,95 40.45,59.55 5,50 40.45,40.45" fill="#00D4FF"/>
</svg>
    VELUM
  </div>
  <div class="logo-sub" id="gym-sub">Check-in</div>
  <div id="root">
    <div class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--text2);">Verificando…</div></div>
  </div>
</div>

<script>
const CHECKIN_URL  = 'https://savzjanpydyjtrgdkllx.supabase.co/functions/v1/move-checkin';
const SUPABASE_URL = 'https://savzjanpydyjtrgdkllx.supabase.co';
const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhdnpqYW5weWR5anRyZ2RrbGx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTAxNDQsImV4cCI6MjA5MTE2NjE0NH0.j2tHPh78lRRDhWokQyrDE3Jt1BUhvXK1Oqj_Kpy4ZGE';

let resetTimer  = null;
let kioscoGymId = null;
let gymBrand    = { nombre:'VELUM', color:'#00D4FF', logo:'' }; // default

/* ── Helpers ── */
function fmt(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtTime(t){
  if(!t) return '';
  const s = t.toLowerCase();
  if(s.includes('am')||s.includes('pm')) return t.toUpperCase();
  const [h,m] = t.split(':');
  const hr = parseInt(h);
  return `${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`;
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr+'T12:00:00');
  return Math.round((d-new Date())/(1000*60*60*24));
}

/* ── Gym brand loader ── */
async function loadGymBrand(gymId){
  if(!gymId) return;
  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/gym_config?gym_id=eq.${gymId}&select=key,value`,
      { headers:{ 'apikey':ANON_KEY, 'Authorization':'Bearer '+ANON_KEY } }
    );
    if(!res.ok) return;
    const rows = await res.json();
    if(!rows.length) return;
    const cfg = {};
    rows.forEach(r=>cfg[r.key]=r.value);

    gymBrand.nombre = cfg.gym_nombre  || gymBrand.nombre;
    gymBrand.color  = cfg.gym_color   || gymBrand.color;
    gymBrand.logo   = cfg.gym_logo_url|| '';

    // Apply brand color as CSS variable
    const hex = gymBrand.color;
    const r=parseInt(hex.slice(1,3),16)||29, g=parseInt(hex.slice(3,5),16)||158, b=parseInt(hex.slice(5,7),16)||117;
    document.documentElement.style.setProperty('--accent', hex);
    document.documentElement.style.setProperty('--ok', hex);

    // Update header: show gym logo or initial instead of VELUM
    const logoEl  = document.querySelector('.logo');
    const subEl   = document.getElementById('gym-sub');
    if(logoEl){
      const initial = gymBrand.nombre[0].toUpperCase();
      if(gymBrand.logo){
        logoEl.innerHTML = `<img src="${gymBrand.logo}" style="height:32px;width:32px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,.12);"/> <span style="letter-spacing:3px;">${gymBrand.nombre.toUpperCase()}</span>`;
      } else {
        logoEl.innerHTML = `<span style="width:28px;height:28px;border-radius:8px;background:${hex};display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;">${initial}</span> <span style="letter-spacing:3px;">${gymBrand.nombre.toUpperCase()}</span>`;
      }
    }
    if(subEl) subEl.textContent = 'Kiosco · Check-in';
    document.title = `${gymBrand.nombre} — Check-in`;
  }catch(e){
    // Silently fail — kiosk still works with default VELUM branding
  }
}

/* ── QR check-in (token mode) ── */
async function doCheckin(token){
  try{
    const res = await fetch(`${CHECKIN_URL}?token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if(!res.ok || !data.ok){ renderError(data.error||'QR inválido'); return; }
    renderSuccess(data);
  } catch(e){
    renderError('Error de conexión. Intenta de nuevo.');
  }
}

/* ── Number check-in (kiosco mode) ── */
async function doCheckinByNumero(numero){
  if(!numero){ showNumErr('Ingresa tu número de cliente.'); return; }
  const btn = document.getElementById('checkin-btn');
  if(btn){ btn.disabled=true; btn.textContent='Verificando…'; }
  hideNumErr();
  try{
    // 1. Look up qr_token (and portal_token as fallback) by numero_cliente
    //    move-checkin searches by qr_token; portal_token is fallback
    const gymFilter = kioscoGymId ? `&gym_id=eq.${kioscoGymId}` : '';
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/clientes?numero_cliente=eq.${encodeURIComponent(numero)}${gymFilter}&select=qr_token,portal_token,nombre&limit=1`,
      { headers:{'apikey':ANON_KEY,'Authorization':`Bearer ${ANON_KEY}`} }
    );
    if(!res.ok){
      showNumErr('Error al consultar. Intenta de nuevo.');
      if(btn){ btn.disabled=false; btn.textContent='Registrar entrada'; }
      return;
    }
    const rows = await res.json();
    if(!Array.isArray(rows) || !rows.length){
      showNumErr('Número de cliente no encontrado.');
      if(btn){ btn.disabled=false; btn.textContent='Registrar entrada'; }
      return;
    }
    // Use qr_token first (native check-in token), fallback to portal_token
    const token = rows[0].qr_token || rows[0].portal_token;
    if(!token){
      showNumErr('Este cliente no tiene token de acceso configurado.');
      if(btn){ btn.disabled=false; btn.textContent='Registrar entrada'; }
      return;
    }
    // 2. Call check-in edge function with token
    const cRes = await fetch(`${CHECKIN_URL}?token=${encodeURIComponent(token)}`);
    const data  = await cRes.json();
    if(!cRes.ok || !data.ok){
      // Show inline error in kiosk, not the full error card
      const msg = data.error || 'No se pudo registrar el acceso.';
      if(msg.includes('no encontrado') || msg.includes('no válido')){
        showNumErr('Cliente no encontrado. Verifica el número.');
      } else {
        showNumErr(msg);
      }
      if(btn){ btn.disabled=false; btn.textContent='Registrar entrada'; }
      return;
    }
    renderSuccess(data, true); // true = kiosco mode → auto-reset
  } catch(e){
    showNumErr('Error de conexión. Intenta de nuevo.');
    if(btn){ btn.disabled=false; btn.textContent='Registrar entrada'; }
  }
}

function showNumErr(msg){ const e=document.getElementById('num-err'); if(e){e.textContent=msg;e.style.display='block';} }
function hideNumErr(){ const e=document.getElementById('num-err'); if(e) e.style.display='none'; }

/* ── Render: success result ── */
function renderSuccess(data, autoReset=false){
  const { cliente, membership_ok, already_checked_in, check_in_time, historial, paquete } = data;
  const dias = daysUntil(cliente.vence);
  const root = document.getElementById('root');

  let statusIcon, badgeClass, badgeText, glow, ringColor, ringBg;
  if(membership_ok && already_checked_in){
    statusIcon='✅'; badgeClass='badge-ok'; badgeText='Ya registrado hoy';
    glow='rgba(16,185,129,.25)'; ringColor='var(--ok)'; ringBg='rgba(16,185,129,.08)';
  } else if(membership_ok){
    statusIcon='🏋️'; badgeClass='badge-ok'; badgeText='Acceso permitido';
    glow='rgba(16,185,129,.25)'; ringColor='var(--ok)'; ringBg='rgba(16,185,129,.08)';
  } else if(dias !== null && dias >= 0 && dias <= 3){
    statusIcon='⚠️'; badgeClass='badge-warn'; badgeText=`Vence en ${dias} día${dias!==1?'s':''}`;
    glow='rgba(245,158,11,.25)'; ringColor='var(--warn)'; ringBg='rgba(245,158,11,.08)';
  } else {
    statusIcon='🚫'; badgeClass='badge-danger'; badgeText='Membresía vencida';
    glow='rgba(239,68,68,.25)'; ringColor='var(--danger)'; ringBg='rgba(239,68,68,.08)';
  }

  const histHTML = historial&&historial.length ? `
    <div class="historial">
      <div class="historial-title">Últimas visitas</div>
      ${historial.map(v=>`<span class="visit-chip">📅 ${fmt(v.fecha)} <span style="font-size:10px;">${fmtTime(v.hora||'')}</span></span>`).join('')}
    </div>` : '';

  const resetHTML = autoReset ? `
    <div class="reset-bar"><div class="reset-fill" id="reset-fill"></div></div>
    <div class="reset-hint">Volviendo al inicio…</div>` : '';

  root.innerHTML = `
    <div class="card" style="--glow:${glow};">
      <div class="status-ring" style="--ring-color:${ringColor};--ring-bg:${ringBg};--ring-glow:${glow};">${statusIcon}</div>
      <span class="status-badge ${badgeClass}">${badgeText}</span>
      <div class="client-name">${cliente.nombre}</div>
      <div class="client-plan">${cliente.membresia||'Membresía'}</div>
      <div>
        <div class="info-row">
          <span class="info-label">Vencimiento</span>
          <span class="info-value" style="color:${dias!==null&&dias<0?'var(--danger)':dias!==null&&dias<=7?'var(--warn)':'var(--text)'};">${fmt(cliente.vence)}</span>
        </div>
        ${check_in_time ? `<div class="info-row">
          <span class="info-label">Check-in hoy</span>
          <span class="info-value" style="color:var(--ok);">⏱ ${fmtTime(check_in_time)}</span>
        </div>` : ''}
        <div class="info-row">
          <span class="info-label">Total visitas</span>
          <span class="info-value">${historial&&historial.length > 0 ? historial.length + (historial.length === 5 ? '+' : '') : '0'}</span>
        </div>
        ${paquete ? `<div class="info-row">
          <span class="info-label">📦 Clases restantes</span>
          <span class="info-value" style="color:${paquete.agotado?'var(--danger)':paquete.clases_restantes<=Math.ceil(paquete.clases_totales*.2)?'var(--warn)':'var(--ok)'};">
            ${paquete.agotado ? '0 — agotado' : paquete.clases_restantes+' de '+paquete.clases_totales}
          </span>
        </div>` : ''}
      </div>
      ${histHTML}
      ${resetHTML}
    </div>`;

  if(autoReset){
    const DELAY = 5000;
    const fill = document.getElementById('reset-fill');
    if(fill){ fill.style.transition=`width ${DELAY}ms linear`; requestAnimationFrame(()=>{ fill.style.width='0%'; }); }
    if(resetTimer) clearTimeout(resetTimer);
    resetTimer = setTimeout(renderKiosco, DELAY);
  }
}

/* ── Render: error ── */
function renderError(msg, autoReset=false){
  document.getElementById('root').innerHTML = `
    <div class="error-card">
      <div class="error-icon">❌</div>
      <div class="error-title">Acceso no válido</div>
      <div class="error-msg">${msg}</div>
      ${autoReset ? `<div class="reset-bar" style="margin-top:20px;"><div class="reset-fill" id="reset-fill"></div></div><div class="reset-hint" style="font-size:11px;color:rgba(255,255,255,.2);margin-top:8px;">Volviendo al inicio…</div>` : ''}
    </div>`;
  if(autoReset){
    const DELAY = 4000;
    const fill = document.getElementById('reset-fill');
    if(fill){ fill.style.transition=`width ${DELAY}ms linear`; requestAnimationFrame(()=>{ fill.style.width='0%'; }); }
    if(resetTimer) clearTimeout(resetTimer);
    resetTimer = setTimeout(renderKiosco, DELAY);
  }
}

/* ── Render: kiosco waiting screen with numpad ── */
function renderKiosco(){
  if(resetTimer){ clearTimeout(resetTimer); resetTimer=null; }
  document.getElementById('root').innerHTML = `
    <div class="kiosco-card">
      <div class="kiosco-icon">🏋️</div>
      <div class="kiosco-title">Bienvenido a ${gymBrand.nombre}</div>
      <div class="kiosco-sub">Ingresa tu número de cliente para registrar tu entrada</div>

      <div class="num-input-wrap">
        <input id="num-input" class="num-input" type="number" inputmode="numeric"
               placeholder="Ej: 42" autocomplete="off" autocorrect="off"
               onkeydown="if(event.key==='Enter') doCheckinByNumero(this.value.trim())"
               oninput="hideNumErr()"/>
        <button class="num-clear" onclick="document.getElementById('num-input').value='';hideNumErr();">✕</button>
      </div>
      <div id="num-err" class="num-err"></div>

      <div class="numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="np-btn" onclick="npPress('${n}')">${n}</button>`).join('')}
        <button class="np-btn np-del" onclick="npDel()">⌫</button>
        <button class="np-btn np-0" onclick="npPress('0')">0</button>
      </div>

      <button id="checkin-btn" class="checkin-btn"
              onclick="doCheckinByNumero(document.getElementById('num-input').value.trim())">
        Registrar entrada
      </button>

      <div class="kiosco-divider"><span>o escanea tu QR</span></div>
      <div style="font-size:12px;color:var(--text2);line-height:1.5;">
        Abre el portal VELUM → toca <strong style="color:#fff;">Check-in</strong><br>y muestra tu código QR al staff.
      </div>
    </div>`;
  // Focus input on desktop
  setTimeout(()=>{ const i=document.getElementById('num-input'); if(i) i.focus(); },100);
}

function npPress(digit){
  const inp = document.getElementById('num-input');
  if(!inp) return;
  if(inp.value.length >= 6) return; // max 6 digits
  inp.value += digit;
  hideNumErr();
}
function npDel(){
  const inp = document.getElementById('num-input');
  if(!inp) return;
  inp.value = inp.value.slice(0,-1);
}

/* ── Init ── */
const params  = new URLSearchParams(window.location.search);
const token   = params.get('token');
const kiosco  = params.get('kiosko') || params.get('kiosco');
kioscoGymId   = params.get('gym_id') || params.get('gym') || null;

if(token){
  doCheckin(token);
} else if(kiosco){
  // Load gym brand first (if gym_id given), then show kiosk
  loadGymBrand(kioscoGymId).then(renderKiosco);
} else {
  renderError('QR inválido. Escanea tu código QR personal.');
}
</script>
