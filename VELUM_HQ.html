        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Ledger — pendiente ${fmtMoney(s.pend)} · pagado ${fmtMoney(s.pag)}
      </h4>
      ${ledgerHTML}
    </div>`;
}

function copiarClabeRef(){
  const r = REF_DATA.refs.find(x => x.id === refFichaId);
  copiarTexto(r && r.contacto ? r.contacto.clabe : '');
}

async function marcarPagado(payoutId){
  const { error } = await sb.from('saas_referral_payouts')
    .update({ estado:'pagado', pagado_at: new Date().toISOString() })
    .eq('id', payoutId);
  if(error){
    console.error(error);
    toast('Error al marcar pagado: ' + (error.message || 'desconocido'), 'err');
    return;
  }
  toast('Comisión marcada como pagada');
  const id = refFichaId;
  await loadReferidos();       // refresca tabla y REF_DATA
  if(id != null) openRefFicha(id); // repinta la ficha con el ledger al día
}

// ── Generar comisiones del mes ──
// Por cada gym ACTIVO atribuido a un referenciador:
//   · alta en el mes actual + bono activo → 'primera_mensualidad' = precio del plan
//   · si no → 'comision_mensual' = precio × pct_comision / 100
// El UNIQUE(referrer_id,gym_id,concepto,periodo) hace la operación idempotente:
// el 23505 se tolera y cuenta como "ya generada".
async function generarComisiones(){
  const btn = document.getElementById('btn-gen-com');
  if(btn){ btn.disabled = true; }
  try{
    await fetchPlanes();
    const [leadsRes, refsRes] = await Promise.all([
      sb.from('saas_leads').select('referrer_id,gym_id')
        .not('referrer_id', 'is', null).not('gym_id', 'is', null),
      sb.from('saas_referrers').select('id,nombre,pct_comision,bono_primera_mensualidad')
    ]);
    if(leadsRes.error) throw leadsRes.error;
    if(refsRes.error) throw refsRes.error;

    const refMap = {};
    (refsRes.data || []).forEach(r => { refMap[r.id] = r; });

    // Pares únicos referenciador↔gym (varios leads pueden apuntar al mismo gym)
    const pares = [];
    const vistos = new Set();
    (leadsRes.data || []).forEach(l => {
      const k = `${l.referrer_id}|${l.gym_id}`;
      if(!vistos.has(k)){ vistos.add(k); pares.push(l); }
    });

    if(pares.length === 0){
      toast('Ningún gym atribuido a un referenciador — asigna "Referido por" en los leads convertidos.');
      if(btn) btn.disabled = false;
      return;
    }

    const gymIds = [...new Set(pares.map(p => p.gym_id))];
    const gymsRes = await sb.from('gyms')
      .select('id,nombre,plan,subscription_status,created_at').in('id', gymIds);
    if(gymsRes.error) throw gymsRes.error;
    const gymMap = {};
    (gymsRes.data || []).forEach(g => { gymMap[g.id] = g; });

    const periodo = primerDiaMes();
    const mesActual = periodo.slice(0, 7);
    let generadas = 0, yaGeneradas = 0, noActivos = 0, fallidas = 0;
    let totalGenerado = 0;

    for(const par of pares){
      const gym = gymMap[par.gym_id];
      const ref = refMap[par.referrer_id];
      if(!gym || !ref) continue;
      if(gym.subscription_status !== 'active'){ noActivos++; continue; }

      const precio = precioPlan(gym.plan);
      const esPrimerMes = String(gym.created_at || '').slice(0, 7) === mesActual;
      let concepto, monto;
      if(esPrimerMes && ref.bono_primera_mensualidad){
        concepto = 'primera_mensualidad';
        monto = precio;
      }else{
        concepto = 'comision_mensual';
        monto = Math.round(precio * (Number(ref.pct_comision) || 0)) / 100;
      }

      const { error } = await sb.from('saas_referral_payouts').insert({
        referrer_id: par.referrer_id, gym_id: par.gym_id, concepto, periodo, monto
      });
      if(!error){
        generadas++; totalGenerado += monto;
      }else if(error.code === '23505' || /duplicate|23505|conflict/i.test(error.message || '')){
        yaGeneradas++; // ya se generó este concepto para este gym en este periodo
      }else{
        fallidas++;
        console.error(error);
      }
    }

    const resumen = [
      generadas > 0 ? `${generadas} generadas (${fmtMoney(totalGenerado)})` : null,
      yaGeneradas > 0 ? `${yaGeneradas} ya existían` : null,
      noActivos > 0 ? `${noActivos} gym(s) sin suscripción activa` : null,
      fallidas > 0 ? `${fallidas} fallidas` : null
    ].filter(Boolean).join(' · ');
    toast(`Comisiones de ${fmtPeriodo(periodo)}: ${resumen || 'nada que generar'}`, fallidas > 0 ? 'err' : 'ok');
    loadReferidos();
  }catch(e){
    console.error(e);
    toast('Error al generar comisiones: ' + (e.message || 'desconocido'), 'err');
    const b = document.getElementById('btn-gen-com');
    if(b) b.disabled = false;
  }
}

  if(e.key !== 'Escape') return;
  if(document.getElementById('modal-ref').classList.contains('open')) closeRefModal();
  else if(document.getElementById('drawer2').classList.contains('open')) closeDrawer2();
});

// ── Cerrar drawer/modales con Escape ──
document.addEventListener('keydown', e => {
  if(e.key !== 'Escape') return;
  if(document.getElementById('modal-perdido').classList.contains('open')) closePerdido();
  else if(document.getElementById('modal-nuevo').classList.contains('open')) closeNuevoLead();
  else if(document.getElementById('drawer').classList.contains('open')) closeFicha();
});
