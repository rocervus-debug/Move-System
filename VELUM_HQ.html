<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>VELUM HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════════════
   VELUM HQ — F1 Pipeline · F2 Cockpit/Cuentas · F3 Salud/Tareas · Referidos
   Tokens heredados del panel (VELUM_Sistema_Interno.html :root)
   ════════════════════════════════════════════════════════════════ */
:root{
  /* ── Base VELUM ── */
  --bg:#040C14;
  --bg-card:#08121E;
  --bg-elevated:#0D1B2A;
  --card:#08121E;
  --card2:#0D1B2A;
  --text:#E8EDF5;
  --text2:#7ABFCC;
  --text3:#687E8A;
  --accent:#00D4FF;
  --accent-light:#66E8FF;
  --accent-bg:color-mix(in srgb, var(--accent) 10%, transparent);
  --accent-bg2:color-mix(in srgb, var(--accent) 18%, transparent);
  --border:color-mix(in srgb, var(--accent) 8%, transparent);
  --border2:color-mix(in srgb, var(--accent) 18%, transparent);
  --surface:rgba(255,255,255,.036);
  --surface2:rgba(255,255,255,.055);
  --ok:#10e8a0;       --ok-bg:rgba(16,232,160,.1);
  --warn:#fbbf24;     --warn-bg:rgba(251,191,36,.1);
  --danger:#f87171;   --danger-bg:rgba(248,113,113,.1);
  --radius:20px;
  --radius-sm:12px;
  --shadow:0 1px 8px rgba(0,0,0,.5);
  --shadow-md:0 4px 24px rgba(0,0,0,.55);
  --shadow-lg:0 12px 48px rgba(0,0,0,.65);
  --glow:0 0 24px color-mix(in srgb, var(--accent) 22%, transparent);
  --font:'Inter',system-ui,sans-serif;
  --font-display:'Outfit',system-ui,sans-serif;
  --fm:'Geist Mono',monospace;
  /* ── Colores por vertical ── */
  --v-gym:#00D4FF;
  --v-studios:#C9A86A;
  --v-recovery:#5EC8B0;
  --sidebar:216px;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ height:100%; }
body{
  background:var(--bg); color:var(--text);
  font-family:var(--font); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{ font-family:inherit; cursor:pointer; }
input,select,textarea{ font-family:inherit; font-size:13px; }
[hidden]{ display:none !important; }
::selection{ background:var(--accent-bg2); }
::-webkit-scrollbar{ height:8px; width:8px; }
::-webkit-scrollbar-thumb{ background:var(--border2); border-radius:8px; }
::-webkit-scrollbar-track{ background:transparent; }

/* ════════ LOGIN ════════ */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(1200px 600px at 80% -10%, color-mix(in srgb, var(--accent) 7%, transparent), transparent),
    var(--bg);
  padding:20px;
}
.login-box{
  width:100%; max-width:380px; background:var(--bg-card);
  border:1px solid var(--border2); border-radius:var(--radius);
  padding:36px 32px; box-shadow:var(--shadow-lg);
}
.login-logo{
  font-family:var(--font-display); font-weight:800; font-size:26px;
  letter-spacing:.14em; text-align:center; margin-bottom:4px;
}
.login-logo span{ color:var(--accent); }
.login-sub{
  text-align:center; color:var(--text3); font-size:12px;
  letter-spacing:.22em; text-transform:uppercase; margin-bottom:28px;
}
.login-field{ margin-bottom:14px; }
.login-field label{
  display:block; font-size:11px; color:var(--text2); letter-spacing:.08em;
  text-transform:uppercase; margin-bottom:6px;
}
.login-field input{
  width:100%; padding:12px 14px; border-radius:var(--radius-sm);
  background:var(--surface); border:1px solid var(--border2);
  color:var(--text); outline:none; transition:border .15s;
}
.login-field input:focus{ border-color:var(--accent); box-shadow:var(--glow); }
.login-btn{
  width:100%; margin-top:8px; padding:13px; border:none; border-radius:var(--radius-sm);
  background:var(--accent); color:#02141C; font-weight:700; font-size:14px;
  letter-spacing:.08em; transition:opacity .15s;
}
.login-btn:hover{ opacity:.88; }
.login-btn:disabled{ opacity:.5; cursor:default; }
.login-error{
  display:none; margin-top:12px; padding:10px 12px; border-radius:var(--radius-sm);
  background:var(--danger-bg); color:var(--danger); font-size:12.5px; text-align:center;
}
.login-error.show{ display:block; }
#totp-row{ margin-top:14px; }

/* ════════ SHELL ════════ */
#app{ display:flex; min-height:100vh; }
.hq-sidebar{
  width:var(--sidebar); flex-shrink:0; background:var(--bg);
  border-right:1px solid var(--border); padding:20px 12px;
  display:flex; flex-direction:column; gap:2px;
  position:sticky; top:0; height:100vh;
}
.hq-brand{
  font-family:var(--font-display); font-weight:800; font-size:18px;
  letter-spacing:.14em; padding:6px 12px 20px; display:flex; align-items:center; gap:8px;
}
.hq-brand svg{ flex-shrink:0; }
.hq-brand em{ font-style:normal; color:var(--accent); }
.nav-item{
  display:flex; align-items:center; gap:10px; width:100%;
  padding:10px 12px; border:none; border-radius:var(--radius-sm);
  background:transparent; color:rgba(200,215,235,.6);
  font-size:13.5px; font-weight:500; text-align:left; transition:background .12s,color .12s;
}
.nav-item svg{ flex-shrink:0; opacity:.8; }
.nav-item:hover{ background:color-mix(in srgb, var(--accent) 10%, transparent); color:var(--text); }
.nav-item.active{
  background:color-mix(in srgb, var(--accent) 16%, transparent); color:#fff;
}
.nav-item.disabled{ opacity:.38; cursor:default; }
.nav-item.disabled:hover{ background:transparent; color:rgba(200,215,235,.6); }
.nav-tag{
  margin-left:auto; font-size:9.5px; font-family:var(--fm); letter-spacing:.06em;
  padding:2px 6px; border-radius:6px; background:var(--surface2); color:var(--text3);
}
.nav-foot{ margin-top:auto; padding:8px 4px 0; border-top:1px solid var(--border); }
.nav-user{ font-size:11.5px; color:var(--text3); padding:8px 8px 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.btn-logout{
  display:flex; align-items:center; gap:8px; width:100%; padding:9px 12px;
  border:none; border-radius:var(--radius-sm); background:transparent;
  color:var(--text3); font-size:12.5px; transition:color .12s,background .12s;
}
.btn-logout:hover{ color:var(--danger); background:var(--danger-bg); }

.hq-main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.hq-header{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:18px 28px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(12px); z-index:20;
}
.hq-title{ font-family:var(--font-display); font-weight:700; font-size:19px; letter-spacing:.02em; }
.hq-header-actions{ display:flex; align-items:center; gap:10px; }
.hq-content{ padding:22px 28px 60px; flex:1; }

/* ════════ BOTONES ════════ */
.btn{
  display:inline-flex; align-items:center; gap:7px; padding:9px 16px;
  border-radius:var(--radius-sm); border:1px solid var(--border2);
  background:var(--surface); color:var(--text); font-size:13px; font-weight:600;
  transition:background .12s,border-color .12s;
}
.btn:hover{ background:var(--surface2); border-color:var(--accent); }
.btn-primary{
  background:var(--accent); border-color:var(--accent); color:#02141C;
}
.btn-primary:hover{ background:var(--accent-light); border-color:var(--accent-light); }
.btn-danger{ background:var(--danger-bg); border-color:transparent; color:var(--danger); }
.btn-danger:hover{ border-color:var(--danger); background:var(--danger-bg); }
.btn:disabled{ opacity:.5; cursor:default; }
.btn-sm{ padding:6px 11px; font-size:12px; }

/* ════════ FILTROS ════════ */
.filters-bar{ display:flex; flex-wrap:wrap; align-items:center; gap:18px; margin-bottom:18px; }
.filter-group{ display:flex; align-items:center; gap:6px; }
.filter-label{ font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-right:2px; }
.chip{
  padding:5px 12px; border-radius:999px; border:1px solid var(--border2);
  background:transparent; color:var(--text2); font-size:12px; font-weight:600;
  transition:all .12s;
}
.chip:hover{ border-color:var(--accent); color:var(--text); }
.chip.on{ background:var(--accent-bg2); border-color:var(--accent); color:var(--accent-light); }
.chip .vdot{ margin-right:5px; }

/* ════════ HOY TOCA ════════ */
.hoy-bar{
  margin-bottom:18px; border:1px solid var(--border2); border-radius:var(--radius);
  background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 6%, var(--bg-card)), var(--bg-card));
  padding:14px 18px;
}
.hoy-head{ display:flex; align-items:center; gap:9px; margin-bottom:10px; }
.hoy-head svg{ color:var(--accent); }
.hoy-head h3{ font-family:var(--font-display); font-size:14px; font-weight:700; letter-spacing:.04em; }
.hoy-head .hoy-count{
  font-family:var(--fm); font-size:11px; color:var(--accent-light);
  background:var(--accent-bg); padding:2px 8px; border-radius:999px;
}
.hoy-list{ display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
.hoy-item{
  flex-shrink:0; min-width:210px; max-width:270px; padding:10px 13px;
  border-radius:var(--radius-sm); background:var(--surface); border:1px solid var(--border);
  cursor:pointer; transition:border-color .12s,background .12s;
}
.hoy-item:hover{ border-color:var(--accent); background:var(--surface2); }
.hoy-item.vencida{ border-color:color-mix(in srgb, var(--danger) 45%, transparent); }
.hoy-item .h-emp{ font-weight:700; font-size:13px; display:flex; align-items:center; gap:7px; }
.hoy-item .h-acc{ font-size:12px; color:var(--text2); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hoy-item .h-meta{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text3); margin-top:5px; font-family:var(--fm); }
.hoy-item .h-meta .venc{ color:var(--danger); font-weight:700; }
.hoy-empty{ font-size:12.5px; color:var(--text3); padding:2px 0 4px; }

/* ════════ KANBAN ════════ */
.kanban-wrap{ overflow-x:auto; padding-bottom:14px; }
.kanban{ display:flex; gap:14px; align-items:flex-start; min-width:max-content; }
.kcol{
  width:262px; flex-shrink:0; background:var(--bg-card);
  border:1px solid var(--border); border-radius:var(--radius);
  display:flex; flex-direction:column; max-height:calc(100vh - 300px); min-height:120px;
}
.kcol-head{
  display:flex; align-items:center; gap:8px; padding:12px 14px;
  border-bottom:1px solid var(--border); position:sticky; top:0;
  background:var(--bg-card); border-radius:var(--radius) var(--radius) 0 0; z-index:2;
}
.kcol-head h4{
  font-family:var(--font-display); font-size:12.5px; font-weight:700;
  letter-spacing:.09em; text-transform:uppercase; color:var(--text2);
}
.kcol-head .kcount{
  margin-left:auto; font-family:var(--fm); font-size:11px; color:var(--text3);
  background:var(--surface2); padding:1px 8px; border-radius:999px;
}
.kcol-head .kdot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.kcol-body{ padding:10px; display:flex; flex-direction:column; gap:9px; overflow-y:auto; }
.kcol-empty{ font-size:11.5px; color:var(--text3); text-align:center; padding:14px 6px 18px; }

.kcard{
  background:var(--card2); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:11px 12px; cursor:pointer; transition:border-color .12s, box-shadow .12s;
  position:relative;
}
.kcard:hover{ border-color:var(--border2); box-shadow:var(--shadow); }
.kcard-top{ display:flex; align-items:flex-start; gap:8px; }
.kcard-emp{ font-weight:700; font-size:13.5px; line-height:1.3; flex:1; word-break:break-word; }
.tier-badge{
  flex-shrink:0; font-family:var(--fm); font-size:10.5px; font-weight:700;
  padding:1px 7px; border-radius:6px; letter-spacing:.04em;
}
.tier-A{ background:var(--accent-bg2); color:var(--accent-light); }
.tier-B{ background:var(--warn-bg); color:var(--warn); }
.tier-C{ background:var(--surface2); color:var(--text3); }
.kcard-meta{ display:flex; align-items:center; gap:8px; margin-top:6px; font-size:11.5px; color:var(--text3); flex-wrap:wrap; }
.vdot{ display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.v-gym{ background:var(--v-gym); }
.v-studios{ background:var(--v-studios); }
.v-recovery{ background:var(--v-recovery); }
.vlabel{ display:inline-flex; align-items:center; gap:5px; }
.kcard-accion{
  margin-top:8px; padding-top:8px; border-top:1px dashed var(--border);
  font-size:11.5px; color:var(--text2); display:flex; align-items:center; gap:6px;
}
.kcard-accion .fecha{ font-family:var(--fm); font-size:10.5px; color:var(--text3); margin-left:auto; flex-shrink:0; }
.kcard-accion.vencida .fecha{ color:var(--danger); font-weight:700; }
.dot-venc{
  position:absolute; top:-4px; right:-4px; width:11px; height:11px; border-radius:50%;
  background:var(--danger); border:2px solid var(--bg-card);
  box-shadow:0 0 10px rgba(248,113,113,.6);
}
.kcard-move{
  display:flex; justify-content:space-between; margin-top:9px; gap:6px;
}
.mv-btn{
  flex:1; display:flex; align-items:center; justify-content:center; padding:5px 0;
  border:1px solid var(--border); border-radius:8px; background:var(--surface);
  color:var(--text2); transition:all .12s;
}
.mv-btn:hover{ border-color:var(--accent); color:var(--accent-light); background:var(--accent-bg); }
.mv-btn.ghost{ visibility:hidden; }

/* ════════ ESTADOS DE CARGA / VACÍO ════════ */
.state-box{
  padding:60px 24px; text-align:center; color:var(--text3);
  border:1px dashed var(--border2); border-radius:var(--radius); background:var(--bg-card);
}
.state-box h3{ font-family:var(--font-display); color:var(--text2); font-size:16px; margin:14px 0 6px; }
.state-box p{ font-size:13px; max-width:420px; margin:0 auto; }
.state-box svg{ color:var(--text3); }
.spinner{
  width:26px; height:26px; margin:0 auto; border-radius:50%;
  border:3px solid var(--border2); border-top-color:var(--accent);
  animation:spin .8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ════════ DRAWER (FICHA DE LEAD) ════════ */
.drawer-overlay{
  position:fixed; inset:0; background:rgba(2,8,14,.65); backdrop-filter:blur(3px);
  z-index:80; display:none;
}
.drawer-overlay.open{ display:block; }
.drawer{
  position:fixed; top:0; right:0; bottom:0; width:min(480px, 100vw);
  background:var(--bg-card); border-left:1px solid var(--border2);
  box-shadow:var(--shadow-lg); z-index:90; display:none;
  flex-direction:column; overflow:hidden;
}
.drawer.open{ display:flex; }
.drawer-head{
  display:flex; align-items:center; gap:12px; padding:18px 22px;
  border-bottom:1px solid var(--border);
}
.drawer-head h3{ font-family:var(--font-display); font-size:17px; font-weight:700; flex:1; word-break:break-word; }
.drawer-close{
  border:none; background:var(--surface); color:var(--text2); width:32px; height:32px;
  border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.drawer-close:hover{ color:var(--text); background:var(--surface2); }
.drawer-body{ flex:1; overflow-y:auto; padding:20px 22px 30px; }
.etapa-pill{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--fm); font-size:11px;
  padding:3px 10px; border-radius:999px; background:var(--accent-bg);
  color:var(--accent-light); letter-spacing:.05em; text-transform:uppercase;
}
.etapa-pill.perdido{ background:var(--danger-bg); color:var(--danger); }
.etapa-pill.pagando{ background:var(--ok-bg); color:var(--ok); }

.f-section{ margin-bottom:22px; }
.f-section > h4{
  font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text3);
  margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:7px;
}
.f-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.f-field{ display:flex; flex-direction:column; gap:4px; }
.f-field.full{ grid-column:1 / -1; }
.f-field label{ font-size:10.5px; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; }
.f-field input, .f-field select, .f-field textarea{
  width:100%; padding:9px 11px; border-radius:9px; background:var(--surface);
  border:1px solid var(--border2); color:var(--text); outline:none; transition:border .12s;
}
.f-field textarea{ resize:vertical; min-height:56px; }
.f-field input:focus, .f-field select:focus, .f-field textarea:focus{ border-color:var(--accent); }
.f-field select option{ background:var(--bg-elevated); color:var(--text); }
.f-motivo{
  margin-top:10px; padding:10px 12px; border-radius:var(--radius-sm);
  background:var(--danger-bg); color:var(--danger); font-size:12.5px;
}

/* ── Bitácora ── */
.bit-form{ display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
.bit-form-row{ display:flex; gap:8px; }
.bit-form select{ width:130px; flex-shrink:0; }
.bit-form textarea{ flex:1; min-height:44px; }
.bit-list{ display:flex; flex-direction:column; gap:0; }
.bit-item{ display:flex; gap:12px; position:relative; padding-bottom:16px; }
.bit-item:last-child{ padding-bottom:0; }
.bit-rail{ display:flex; flex-direction:column; align-items:center; flex-shrink:0; width:26px; }
.bit-ico{
  width:26px; height:26px; border-radius:50%; background:var(--surface2);
  border:1px solid var(--border2); display:flex; align-items:center; justify-content:center;
  color:var(--text2); flex-shrink:0;
}
.bit-item.t-etapa .bit-ico{ background:var(--accent-bg); color:var(--accent-light); border-color:transparent; }
.bit-line{ flex:1; width:1px; background:var(--border); margin-top:4px; }
.bit-item:last-child .bit-line{ display:none; }
.bit-content{ flex:1; padding-top:2px; min-width:0; }
.bit-tipo{ font-size:10.5px; font-family:var(--fm); letter-spacing:.08em; text-transform:uppercase; color:var(--text3); }
.bit-detalle{ font-size:13px; color:var(--text); margin-top:2px; white-space:pre-wrap; word-break:break-word; }
.bit-fecha{ font-size:10.5px; font-family:var(--fm); color:var(--text3); margin-top:3px; }
.bit-empty{ font-size:12.5px; color:var(--text3); padding:8px 0; }

.drawer-foot{
  padding:14px 22px; border-top:1px solid var(--border); display:flex; gap:10px;
  background:var(--bg-card);
}
.drawer-foot .btn{ flex:1; justify-content:center; }

/* ════════ MODALES ════════ */
.modal-overlay{
  position:fixed; inset:0; background:rgba(2,8,14,.7); backdrop-filter:blur(3px);
  z-index:100; display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open{ display:flex; }
.modal{
  width:100%; max-width:440px; background:var(--bg-card); border:1px solid var(--border2);
  border-radius:var(--radius); box-shadow:var(--shadow-lg); overflow:hidden;
  max-height:90vh; display:flex; flex-direction:column;
}
.modal-head{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:16px 20px; border-bottom:1px solid var(--border);
}
.modal-head h3{ font-family:var(--font-display); font-size:16px; font-weight:700; }
.modal-body{ padding:18px 20px; overflow-y:auto; }
.modal-foot{ padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

/* ════════ TOASTS ════════ */
#toast-zone{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center;
  pointer-events:none;
}
.toast{
  display:flex; align-items:center; gap:9px; padding:11px 18px;
  border-radius:var(--radius-sm); background:var(--bg-elevated);
  border:1px solid var(--border2); color:var(--text); font-size:13px; font-weight:500;
  box-shadow:var(--shadow-md); animation:toastIn .2s ease;
  max-width:min(480px, 90vw);
}
.toast svg{ flex-shrink:0; }
.toast.ok svg{ color:var(--ok); }
.toast.err{ border-color:color-mix(in srgb, var(--danger) 45%, transparent); }
.toast.err svg{ color:var(--danger); }
@keyframes toastIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }

/* ════════ VISTAS PLACEHOLDER ════════ */
.placeholder-view{ max-width:520px; margin:60px auto 0; }

/* ════════════════════════════════════════════════════════════════
   F2/F3 + REFERIDOS — métricas, tablas, salud, tareas, ledger
   ════════════════════════════════════════════════════════════════ */

/* ── Cockpit: métricas ── */
.metric-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:14px; }
.metric-card{ background:var(--bg-card); border:1px solid var(--border2); border-radius:var(--radius); padding:18px 20px; }
.metric-label{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); }
.metric-val{ font-family:var(--font-display); font-weight:800; font-size:30px; margin-top:6px; letter-spacing:.01em; }
.metric-val.accent{ color:var(--accent-light); }
.metric-sub{ font-size:11.5px; color:var(--text3); margin-top:4px; }
.metric-mini{ display:flex; flex-wrap:wrap; gap:14px; margin-bottom:16px; }
.mini-metric{
  flex:1; min-width:170px; display:flex; align-items:baseline; gap:10px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:12px 16px; cursor:pointer; transition:border-color .12s;
}
.mini-metric:hover{ border-color:var(--accent); }
.mini-metric b{ font-family:var(--font-display); font-size:19px; font-weight:800; }
.mini-metric span{ font-size:12px; color:var(--text3); }

/* ── Cockpit: gráfica GMV (barras CSS puras) ── */
.chart-card{ background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
.chart-title{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); margin-bottom:16px; }
.chart-bars{ display:flex; align-items:flex-end; gap:14px; height:160px; }
.chart-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:6px; min-width:0; }
.chart-bar{
  width:100%; max-width:64px; border-radius:8px 8px 3px 3px; min-height:3px;
  background:linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent));
}
.chart-col.cero .chart-bar{ background:var(--surface2); }
.chart-val{ font-family:var(--fm); font-size:10.5px; color:var(--text2); white-space:nowrap; }
.chart-x{ font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; }

/* ── Tablas (Cuentas / Salud / Referidos) ── */
.tbl-wrap{ overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-card); }
table.tbl{ width:100%; border-collapse:collapse; min-width:680px; }
.tbl th{
  text-align:left; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--text3); padding:12px 14px; border-bottom:1px solid var(--border); white-space:nowrap;
}
.tbl td{ padding:11px 14px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
.tbl tbody tr{ cursor:pointer; transition:background .12s; }
.tbl tbody tr:hover{ background:var(--surface); }
.tbl tbody tr:last-child td{ border-bottom:none; }
.td-mono{ font-family:var(--fm); font-size:12px; color:var(--text2); white-space:nowrap; }
.td-num{ font-family:var(--fm); font-size:12.5px; white-space:nowrap; }

/* ── Pills de estado de cuenta ── */
.estado-pill{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--fm); font-size:11px;
  padding:3px 10px; border-radius:999px; letter-spacing:.04em; white-space:nowrap;
}
.estado-pill.ok{ background:var(--ok-bg); color:var(--ok); }
.estado-pill.warn{ background:var(--warn-bg); color:var(--warn); }
.estado-pill.danger{ background:var(--danger-bg); color:var(--danger); }
.estado-pill.neutral{ background:var(--surface2); color:var(--text2); }

/* ── Salud: semáforo ── */
.sem-dot{ display:inline-block; width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.sem-verde{ background:var(--ok); box-shadow:0 0 10px rgba(16,232,160,.5); }
.sem-amarillo{ background:var(--warn); box-shadow:0 0 10px rgba(251,191,36,.5); }
.sem-rojo{ background:var(--danger); box-shadow:0 0 10px rgba(248,113,113,.5); }

/* ── Tareas ── */
.task-form{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.task-form input{
  padding:9px 11px; border-radius:9px; background:var(--surface);
  border:1px solid var(--border2); color:var(--text); outline:none; transition:border .12s;
}
.task-form input:focus{ border-color:var(--accent); }
.task-form input[type=text]{ flex:1; min-width:200px; }
.task-list{ display:flex; flex-direction:column; gap:9px; margin-top:16px; }
.task-item{
  display:flex; gap:12px; align-items:flex-start; background:var(--bg-card);
  border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px;
}
.task-item.vencida{ border-color:color-mix(in srgb, var(--danger) 40%, transparent); }
.task-check{
  width:24px; height:24px; border-radius:8px; border:1px solid var(--border2);
  background:var(--surface); color:transparent; display:flex; align-items:center;
  justify-content:center; flex-shrink:0; transition:all .12s;
}
.task-check:hover{ border-color:var(--ok); color:var(--ok); background:var(--ok-bg); }
.task-main{ flex:1; min-width:0; }
.task-titulo{ font-weight:600; font-size:13.5px; word-break:break-word; }
.task-meta{ display:flex; flex-wrap:wrap; gap:8px; font-size:11.5px; color:var(--text3); margin-top:3px; align-items:center; }
.task-tipo{
  font-family:var(--fm); font-size:10px; padding:1px 7px; border-radius:6px;
  background:var(--surface2); color:var(--text3); letter-spacing:.05em;
}
.task-tipo.auto{ background:var(--accent-bg); color:var(--accent-light); }
.task-due.venc{ color:var(--danger); font-weight:700; }

/* ── Referidos ── */
.ref-tag{
  font-family:var(--fm); font-size:9.5px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; padding:1px 6px; border-radius:6px;
  background:color-mix(in srgb, #c084fc 16%, transparent); color:#c084fc;
}

/* ── Secciones / detalle en drawer secundario ── */
.sec-card{ background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:16px; }
.sec-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.sec-title{ font-family:var(--font-display); font-size:14px; font-weight:700; letter-spacing:.04em; display:flex; align-items:center; gap:8px; }
.sec-title svg{ color:var(--accent); }
.mini-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.mini-stat{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:12px 14px; display:flex; flex-direction:column; gap:2px;
}
.mini-stat b{ font-family:var(--font-display); font-size:20px; font-weight:800; }
.mini-stat span{ font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; }
.kv-grid{ display:grid; grid-template-columns:auto 1fr; gap:6px 14px; font-size:13px; }
.kv-grid dt{ color:var(--text3); font-size:11px; text-transform:uppercase; letter-spacing:.08em; padding-top:2px; white-space:nowrap; }
.kv-grid dd{ margin:0; word-break:break-word; }
.nota-item{ padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--surface); margin-bottom:8px; }
.nota-texto{ font-size:13px; white-space:pre-wrap; word-break:break-word; }
.nota-fecha{ font-family:var(--fm); font-size:10.5px; color:var(--text3); margin-top:4px; }
.pay-row{
  display:flex; align-items:center; gap:10px; padding:10px 12px; flex-wrap:wrap;
  border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--surface); margin-bottom:8px;
}
.pay-info{ flex:1; min-width:140px; }
.pay-concepto{ font-size:13px; font-weight:600; }
.pay-periodo{ font-family:var(--fm); font-size:11px; color:var(--text3); }
.pay-monto{ font-family:var(--fm); font-size:13.5px; font-weight:700; white-space:nowrap; }
.f-field .chk{
  display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text);
  cursor:pointer; text-transform:none; letter-spacing:0;
}
.chk input{ width:15px; height:15px; accent-color:var(--accent); }

@media (max-width: 860px){
  .hq-sidebar{ width:64px; padding:16px 8px; }
  .hq-sidebar .nav-label, .hq-sidebar .nav-tag, .hq-brand em, .hq-brand b, .nav-user{ display:none; }
  .nav-item{ justify-content:center; padding:10px 0; }
  .hq-brand{ justify-content:center; padding-bottom:16px; }
  .btn-logout{ justify-content:center; }
  .btn-logout .nav-label{ display:none; }
  .hq-content{ padding:16px 14px 60px; }
  .hq-header{ padding:14px 16px; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     LOGIN — mismo contrato que el panel: move-login → JWT custom.
     El gate app_rol==='superadmin' es UX; la seguridad real es RLS.
     ═══════════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">VELUM <span>HQ</span></div>
    <div class="login-sub">Operación · solo superadmin</div>
    <form id="login-form" onsubmit="doLogin(event)">
      <div class="login-field">
        <label for="login-email">Correo</label>
        <input id="login-email" type="email" autocomplete="username" required/>
      </div>
      <div class="login-field">
        <label for="login-pass">Contraseña</label>
        <input id="login-pass" type="password" autocomplete="current-password" required/>
      </div>
      <div class="login-field" id="totp-row" hidden>
        <label for="login-totp">Código 2FA</label>
        <input id="login-totp" type="text" inputmode="numeric" autocomplete="one-time-code"
               maxlength="11" placeholder="000000" style="font-family:var(--fm);letter-spacing:4px;text-align:center;"/>
      </div>
      <button type="submit" class="login-btn" id="login-btn">ENTRAR</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SHELL — header + nav lateral. Solo Pipeline es funcional en F1.
     ═══════════════════════════════════════════════════════════════ -->
<div id="app" hidden>
  <aside class="hq-sidebar">
    <div class="hq-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4l9 16L21 4"/></svg>
      <b>VELUM</b> <em>HQ</em>
    </div>

    <button class="nav-item" onclick="showView('cockpit')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
      <span class="nav-label">Cockpit</span>
    </button>
    <button class="nav-item active" id="nav-pipeline" onclick="showView('pipeline')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="7" rx="1"/></svg>
      <span class="nav-label">Pipeline</span>
    </button>
    <button class="nav-item" onclick="showView('cuentas')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="nav-label">Cuentas</span>
    </button>
    <button class="nav-item" onclick="showView('salud')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <span class="nav-label">Salud</span>
    </button>
    <button class="nav-item" onclick="showView('tareas')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="nav-label">Tareas</span>
    </button>
    <button class="nav-item" onclick="showView('referidos')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
      <span class="nav-label">Referidos</span>

    <div class="nav-foot">
      <div class="nav-user" id="nav-user"></div>
      <button class="btn-logout" onclick="logout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
        <span class="nav-label">Salir</span>
      </button>
    </div>
  </aside>

  <div class="hq-main">
    <header class="hq-header">
      <div class="hq-title" id="view-title">Pipeline</div>
      <div class="hq-header-actions">
        <button class="btn btn-primary" id="btn-nuevo-lead" onclick="openNuevoLead()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Nuevo lead
        </button>
        <button class="btn btn-primary" id="btn-nuevo-ref" onclick="openRefModal()" hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Nuevo referenciador

    </header>

    <main class="hq-content">
      <!-- ─── VISTA: PIPELINE ─── -->
      <section id="view-pipeline">

        <div id="pipeline-zone">
          <div class="state-box"><div class="spinner"></div><h3>Cargando pipeline…</h3></div>
        </div>

      <!-- ─── VISTA: COCKPIT (F2a) ─── -->
      <section id="view-cockpit" hidden>
        <div id="cockpit-zone">
          <div class="state-box"><div class="spinner"></div><h3>Cargando cockpit…</h3></div>
        </div>
      </section>

      <!-- ─── VISTA: CUENTAS (F2b) ─── -->
      <section id="view-cuentas" hidden>
        <div id="cuentas-zone">
          <div class="state-box"><div class="spinner"></div><h3>Cargando cuentas…</h3></div>
        </div>
      </section>

      <!-- ─── VISTA: SALUD (F3) ─── -->
      <section id="view-salud" hidden>
        <div id="salud-zone">
          <div class="state-box"><div class="spinner"></div><h3>Cargando salud…</h3></div>
        </div>
      </section>

      <!-- ─── VISTA: TAREAS (F3) ─── -->
      <section id="view-tareas" hidden>
        <div id="tareas-zone">
          <div class="state-box"><div class="spinner"></div><h3>Cargando tareas…</h3></div>
        </div>
      </section>

          <div class="state-box"><div class="spinner"></div><h3>Cargando referidos…</h3></div>
        </div>
      </section>

</div>

<!-- ═══ DRAWER: FICHA DE LEAD ═══ -->

    </div>
  </div>
</div>

<!-- ═══ MODAL: MOTIVO PERDIDO ═══ -->
<div class="modal-overlay" id="modal-perdido">
  <div class="modal">
    <div class="modal-head">
      <h3>Marcar como perdido</h3>
      <button class="drawer-close" onclick="closePerdido()" aria-label="Cerrar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="f-field">

  </div>
</div>

<!-- ═══ DRAWER SECUNDARIO: DETALLE DE GYM / FICHA DE REFERENCIADOR ═══ -->
<div class="drawer-overlay" id="drawer2-overlay" onclick="closeDrawer2()"></div>
<div class="drawer" id="drawer2" role="dialog" aria-label="Detalle">
  <div class="drawer-head">
    <h3 id="drawer2-title"></h3>
    <span class="estado-pill neutral" id="drawer2-pill" hidden></span>
    <button class="drawer-close" onclick="closeDrawer2()" aria-label="Cerrar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>

// gobierna las tablas saas_* — el gate del cliente es solo UX.
// ════════════════════════════════════════════════════════════════

// ── Config (idéntica al panel) ──
const SUPABASE_URL  = 'https://savzjanpydyjtrgdkllx.supabase.co';
const SUPABASE_ANON = 'sb_publishable_gsUyT71kgtdJkD4X8WSx7g_0EuwOrqd';
const EDGE_LOGIN_URL = `${SUPABASE_URL}/functions/v1/move-login`;
const SESSION_KEY = 'velum_hq_session'; // clave propia — no pisa move_session del panel

let sb = null;          // cliente Supabase autenticado (JWT en Authorization)
let HQ_USER = null;     // sesión activa {email, jwt, claims}

// ── Catálogo de etapas (orden = flujo 4 de venta) ──
const ETAPAS = ['lead','contactado','calificado','demo','trial','pagando','perdido','nurture'];
const ETAPA_LABEL = {
  lead:'Lead', contactado:'Contactado', calificado:'Calificado', demo:'Demo',

};
// Color del punto de cada columna (semántico, no por vertical)
const ETAPA_COLOR = {
  lead:'#687E8A', contactado:'#7ABFCC', calificado:'#66E8FF', demo:'#00D4FF',
  trial:'#C9A86A', pagando:'#10e8a0', perdido:'#f87171', nurture:'#c084fc'
};
// Etapas terminales: no aparecen en "Hoy toca"
const ETAPAS_TERMINALES = ['pagando','perdido'];

const VERTICAL_LABEL = { gym:'Gym', studios:'Studios', recovery:'Recovery' };
const CANALES = ['manual','prospeccion-bajio','landing','referido','meta-ads'];
const CANAL_LABEL = {
  'manual':'Manual', 'prospeccion-bajio':'Prospección Bajío', 'landing':'Landing',
  'referido':'Referido', 'meta-ads':'Meta Ads'
};

// ════════════════════════════════════════════════════════════════
// UTILIDADES
// ════════════════════════════════════════════════════════════════

// Escapar HTML — todo dato de DB pasa por aquí antes de innerHTML
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

// Fecha local de hoy en ISO (YYYY-MM-DD) — sin sorpresas de UTC
function hoyISO(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// "2026-07-06" → "6 jul" (o "6 jul 25" si es otro año)
function fmtFecha(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const base = `${d} ${meses[(m||1)-1]}`;
  return y === new Date().getFullYear() ? base : `${base} ${String(y).slice(-2)}`;
}

// timestamptz → "6 jul · 14:32"
function fmtTimestamp(ts){
  if(!ts) return '';
  const d = new Date(ts);
  if(isNaN(d)) return '';
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const y = d.getFullYear() === new Date().getFullYear() ? '' : ` ${d.getFullYear()}`;
  return `${d.getDate()} ${meses[d.getMonth()]}${y} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// SHA-256 del password (mismo contrato que el panel con move-login)
async function hashPassword(pass){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Decodificar payload de JWT — base64url → UTF-8 seguro (acentos/ñ en claims)
function decodeJwt(jwt){
  try{
    const b64 = jwt.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const bin = atob(b64.padEnd(b64.length + (4 - b64.length % 4) % 4, '='));
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    return JSON.parse(new TextDecoder().decode(bytes));
  }catch(e){ return null; }
}

// Toast — única vía de feedback; ningún error de query se queda en silencio
function toast(msg, kind){
  const zone = document.getElementById('toast-zone');
  const el = document.createElement('div');
  el.className = `toast ${kind === 'err' ? 'err' : 'ok'}`;
  const icon = kind === 'err'
    ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>'
    : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  el.innerHTML = `${icon}<span>${esc(msg)}</span>`;
  zone.appendChild(el);
  setTimeout(() => el.remove(), kind === 'err' ? 5000 : 3200);
}

// ════════════════════════════════════════════════════════════════
// AUTH — login / sesión / gate superadmin
// ════════════════════════════════════════════════════════════════

function getSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); }
  catch(e){ return null; }
}
function setSession(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

// Cliente Supabase con el JWT custom en Authorization → RLS activo
function initAuthClient(jwt){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    global: { headers: { Authorization: `Bearer ${jwt}` } },
    auth:   { persistSession:false, autoRefreshToken:false }
  });
}

function showLoginError(msg){
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.add('show');
}

async function doLogin(ev){
  if(ev) ev.preventDefault();
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-pass').value;
  const totp  = document.getElementById('login-totp').value.trim();
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  errEl.classList.remove('show');
  if(!email || !pass){ showLoginError('Completa todos los campos.'); return; }

  btn.textContent = 'Verificando…'; btn.disabled = true;
  try{
    const pw_hash = await hashPassword(pass);
    const reqBody = { email, pw_hash };
    if(totp) reqBody.totp_code = totp;

    const res = await fetch(EDGE_LOGIN_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(reqBody)
    });
    const result = await res.json();

    // 2FA: si el usuario lo tiene activo, pedimos el código en la misma pantalla
    if(result.requires_2fa){
      document.getElementById('totp-row').hidden = false;
      document.getElementById('login-totp').focus();
      showLoginError(result.error || 'Escribe tu código de 6 dígitos.');
      btn.textContent = 'ENTRAR'; btn.disabled = false;
      return;
    }
    if(result.requires_2fa_enrollment){
      showLoginError('Tu cuenta requiere configurar 2FA — hazlo desde el panel primero.');
      btn.textContent = 'ENTRAR'; btn.disabled = false;
      return;
    }
    if(!res.ok || !result.token){
      showLoginError(result.error || 'Correo o contraseña incorrectos.');
      btn.textContent = 'ENTRAR'; btn.disabled = false;
      return;
    }

    // ── Gate UX: solo superadmin entra a HQ (la defensa real es RLS) ──
    const claims = decodeJwt(result.token);
    if(!claims || claims.app_rol !== 'superadmin'){
      showLoginError('Solo superadmin puede entrar a VELUM HQ.');
      clearSession();
      btn.textContent = 'ENTRAR'; btn.disabled = false;
      return;
    }

    const session = { email, jwt: result.token, claims, user: result.user || null };
    setSession(session);
    HQ_USER = session;
    initAuthClient(result.token);
    entrarApp();
  }catch(e){
    console.error(e);
    showLoginError('Error de conexión.');
  }
  btn.textContent = 'ENTRAR'; btn.disabled = false;
}

function logout(){
  clearSession();
  HQ_USER = null; sb = null; LEADS = [];
  document.getElementById('app').hidden = true;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-totp').value = '';
  document.getElementById('totp-row').hidden = true;
}

// Mostrar shell: se entra por el Cockpit (F2a) y el pipeline se
// precarga en segundo plano para que "Hoy toca" esté listo al cambiar
function entrarApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').hidden = false;
  document.getElementById('nav-user').textContent = HQ_USER.email || '';
  showView('cockpit');
  loadLeads();
}

// Al abrir la página: restaurar sesión si el JWT sigue vigente y es superadmin
function boot(){
  const s = getSession();
  if(s && s.jwt){
    const claims = decodeJwt(s.jwt);
    const vigente = claims && (!claims.exp || claims.exp * 1000 > Date.now());
    if(vigente && claims.app_rol === 'superadmin'){
      HQ_USER = { ...s, claims };
      initAuthClient(s.jwt);
      entrarApp();
      return;
    }
    clearSession(); // expirado o rol inválido → login limpio
  }
}
document.addEventListener('DOMContentLoaded', boot);

// ════════════════════════════════════════════════════════════════
// NAVEGACIÓN — todas las vistas activas (F1: Pipeline · F2: Cockpit
// y Cuentas · F3: Salud y Tareas · Referidos)

const VIEW_TITLES = {
  pipeline:'Pipeline', cockpit:'Cockpit', cuentas:'Cuentas',
  salud:'Salud', tareas:'Tareas', referidos:'Referidos'
};
// Cada vista refresca sus datos al abrirse (pipeline conserva su carga de F1)
const VIEW_LOADERS = {
  cockpit:'loadCockpit', cuentas:'loadCuentas', salud:'loadSalud',
  tareas:'loadTareas', referidos:'loadReferidos'
};

function showView(name){
  Object.keys(VIEW_TITLES).forEach(v => {
    const el = document.getElementById(`view-${v}`);
    if(el) el.hidden = (v !== name);
  });
  document.getElementById('view-title').textContent = VIEW_TITLES[name] || name;
  document.getElementById('btn-nuevo-lead').hidden = (name !== 'pipeline');
  document.getElementById('btn-nuevo-ref').hidden = (name !== 'referidos');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`.nav-item[onclick="showView('${name}')"]`);
  if(activeBtn) activeBtn.classList.add('active');
  const loader = VIEW_LOADERS[name];
  if(loader && typeof window[loader] === 'function') window[loader]();
}

async function loadLeads(){
  const zone = document.getElementById('pipeline-zone');
  zone.innerHTML = '<div class="state-box"><div class="spinner"></div><h3>Cargando pipeline…</h3></div>';
  const { data, error } = await sb
    .from('saas_leads')
    .select('*')
    .order('proxima_accion_fecha', { ascending:true, nullsFirst:false })
    .order('updated_at', { ascending:false });
  if(error){
    console.error(error);
    zone.innerHTML = `
      <div class="state-box">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>

}

// Registrar un evento en la bitácora (saas_lead_events)
async function registrarEvento(leadId, tipo, detalle){

  });

function setFiltro(campo, valor){
  FILTROS[campo] = valor;
  renderPipeline();
}

function leadsFiltrados(){
  return LEADS.filter(l =>
    (FILTROS.vertical === 'todos' || l.vertical === FILTROS.vertical) &&
    (FILTROS.tier === 'todos' || l.tier === FILTROS.tier)
  );
}

function renderPipeline(){
  renderFiltros();
  renderHoyToca();
  renderKanban();
}

function renderFiltros(){
  const chip = (campo, valor, label, extra) => `
    <button class="chip ${FILTROS[campo] === valor ? 'on' : ''}"
            onclick="setFiltro('${campo}','${valor}')">${extra || ''}${label}</button>`;
  document.getElementById('filters-bar').innerHTML = `
    <div class="filter-group">
      <span class="filter-label">Vertical</span>
      ${chip('vertical','todos','Todos')}
      ${chip('vertical','gym','Gym','<span class="vdot v-gym"></span>')}
      ${chip('vertical','studios','Studios','<span class="vdot v-studios"></span>')}

    </div>
    <div class="filter-group">
      <span class="filter-label">Tier</span>
      ${chip('tier','todos','Todos')}
      ${chip('tier','A','A')}
      ${chip('tier','B','B')}
      ${chip('tier','C','C')}
    </div>`;
}

// Barra "Hoy toca": la lista de llamadas del día — proxima_accion_fecha <= hoy
// en etapas no terminales, ordenadas por fecha (las más vencidas primero)
function renderHoyToca(){
  const hoy = hoyISO();
  const pendientes = LEADS
    .filter(l => l.proxima_accion_fecha && l.proxima_accion_fecha <= hoy
              && !ETAPAS_TERMINALES.includes(l.etapa))
    .sort((a,b) => a.proxima_accion_fecha.localeCompare(b.proxima_accion_fecha));

  const items = pendientes.length === 0
    ? '<div class="hoy-empty">Nada pendiente para hoy — agenda la próxima acción de tus leads activos.</div>'
    : `<div class="hoy-list">${pendientes.map(l => {
        const vencida = l.proxima_accion_fecha < hoy;
        return `
        <div class="hoy-item ${vencida ? 'vencida' : ''}" onclick="openFicha(${l.id})">
          <div class="h-emp"><span class="vdot v-${esc(l.vertical)}"></span>${esc(l.empresa)}</div>
          <div class="h-acc">${esc(l.proxima_accion || 'Sin acción definida')}</div>
          <div class="h-meta">
            <span class="${vencida ? 'venc' : ''}">${vencida ? 'Vencida · ' : ''}${fmtFecha(l.proxima_accion_fecha)}</span>
            <span>${esc(ETAPA_LABEL[l.etapa] || l.etapa)}</span>
          </div>
        </div>`;
      }).join('')}</div>`;

  document.getElementById('hoy-bar').innerHTML = `
    <div class="hoy-bar">
      <div class="hoy-head">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <h3>Hoy toca</h3>
        <span class="hoy-count">${pendientes.length}</span>
      </div>
      ${items}
    </div>`;
}

function renderKanban(){
  const zone = document.getElementById('pipeline-zone');
  const filtrados = leadsFiltrados();

  // Estado vacío global: pipeline sin un solo lead
  if(LEADS.length === 0){
    zone.innerHTML = `
      <div class="state-box">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="7" rx="1"/></svg>
        <h3>El pipeline está vacío</h3>
        <p>Importa tus 36 leads del Bajío — pídeselo a Claude. O captura el primero con "Nuevo lead".</p>
        <p style="margin-top:14px;"><button class="btn btn-primary" onclick="openNuevoLead()">Nuevo lead</button></p>
      </div>`;
    return;
  }

  const cols = ETAPAS.map(etapa => {
    const leads = filtrados.filter(l => l.etapa === etapa);
    const cards = leads.length === 0
      ? '<div class="kcol-empty">Sin leads</div>'
      : leads.map(cardHTML).join('');
    return `
      <div class="kcol">
        <div class="kcol-head">
          <span class="kdot" style="background:${ETAPA_COLOR[etapa]}"></span>
          <h4>${ETAPA_LABEL[etapa]}</h4>
          <span class="kcount">${leads.length}</span>
        </div>
        <div class="kcol-body">${cards}</div>
      </div>`;
  }).join('');

  zone.innerHTML = `<div class="kanban-wrap"><div class="kanban">${cols}</div></div>`;
}

function cardHTML(l){
  const hoy = hoyISO();
  const vencida = l.proxima_accion_fecha && l.proxima_accion_fecha < hoy;
  const idx = ETAPAS.indexOf(l.etapa);
  const flechaIzq = idx > 0
    ? `<button class="mv-btn" onclick="event.stopPropagation();moverEtapa(${l.id},-1)" title="Mover a ${ETAPA_LABEL[ETAPAS[idx-1]]}" aria-label="Etapa anterior">
         <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
       </button>`
    : '<button class="mv-btn ghost" tabindex="-1"></button>';
  const flechaDer = idx < ETAPAS.length - 1
    ? `<button class="mv-btn" onclick="event.stopPropagation();moverEtapa(${l.id},1)" title="Mover a ${ETAPA_LABEL[ETAPAS[idx+1]]}" aria-label="Etapa siguiente">
         <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
       </button>`
    : '<button class="mv-btn ghost" tabindex="-1"></button>';

  const accion = l.proxima_accion || l.proxima_accion_fecha
    ? `<div class="kcard-accion ${vencida ? 'vencida' : ''}">
         <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
         <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(l.proxima_accion || 'Acción sin describir')}</span>
         ${l.proxima_accion_fecha ? `<span class="fecha">${fmtFecha(l.proxima_accion_fecha)}</span>` : ''}
       </div>`
    : '';

  return `

// MOVER DE ETAPA — UPDATE + evento 'etapa' automático en la bitácora
// ════════════════════════════════════════════════════════════════

async function moverEtapa(id, dir){
  const lead = LEADS.find(l => l.id === id);
  if(!lead) return;
  const idx = ETAPAS.indexOf(lead.etapa);
  const nuevoIdx = idx + dir;
  if(nuevoIdx < 0 || nuevoIdx >= ETAPAS.length) return;
  const nueva = ETAPAS[nuevoIdx];

  // Mover a 'perdido' exige motivo — se resuelve en el modal
  if(nueva === 'perdido'){
    perdidoLeadId = id;
    document.getElementById('perdido-motivo').value = '';
    document.getElementById('perdido-label').textContent = `Motivo — ${lead.empresa}`;
    document.getElementById('modal-perdido').classList.add('open');
    setTimeout(() => document.getElementById('perdido-motivo').focus(), 60);
    return;
  }
  await aplicarCambioEtapa(id, nueva, null);
}

function closePerdido(){
  perdidoLeadId = null;
  document.getElementById('modal-perdido').classList.remove('open');
}

async function confirmarPerdido(){
  const motivo = document.getElementById('perdido-motivo').value.trim();
  if(!motivo){ toast('Escribe el motivo — es el aprendizaje del pipeline.', 'err'); return; }
  if(perdidoLeadId == null) return;
  const id = perdidoLeadId;
  const btn = document.getElementById('btn-confirmar-perdido');
  btn.disabled = true;
  await aplicarCambioEtapa(id, 'perdido', motivo);
  btn.disabled = false;
  closePerdido();
}

// UPDATE de etapa (+motivo si aplica) e INSERT del evento tipo 'etapa'
async function aplicarCambioEtapa(id, nueva, motivo){
  const lead = LEADS.find(l => l.id === id);
  if(!lead) return;
  const anterior = lead.etapa;

  const patch = { etapa: nueva };
  if(nueva === 'perdido') patch.motivo_perdido = motivo;

  const { error } = await sb.from('saas_leads').update(patch).eq('id', id);
  if(error){
    console.error(error);
    toast('Error al mover etapa: ' + (error.message || 'desconocido'), 'err');
    return;
  }

  // Bitácora automática del cambio de etapa
  let detalle = `${ETAPA_LABEL[anterior] || anterior} → ${ETAPA_LABEL[nueva] || nueva}`;
  if(motivo) detalle += ` · Motivo: ${motivo}`;
  await registrarEvento(id, 'etapa', detalle);

  // Actualizar cache local y repintar
  lead.etapa = nueva;
  if(nueva === 'perdido') lead.motivo_perdido = motivo;
  renderPipeline();
  toast(`${lead.empresa} → ${ETAPA_LABEL[nueva]}`);
  // Si la ficha está abierta sobre este lead, refrescar bitácora y pill
  if(fichaLeadId === id){
    pintarEtapaPill(lead);
    loadEventos(id);
  }
}

const MESES_CORTOS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const ETAPAS_ABIERTAS_EXCL = ['perdido','pagando','nurture']; // "lead abierto" = etapa fuera de estas

function fmtMoney(n){
  return '$' + (Number(n) || 0).toLocaleString('es-MX', { maximumFractionDigits:0 });
}
// timestamp ISO de hace N días (para filtros gte sobre timestamptz)
function isoDiasAtras(n){ return new Date(Date.now() - n * 86400000).toISOString(); }
// Primer día del mes actual en local — el "periodo" del ledger de comisiones
function primerDiaMes(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
// Días completos transcurridos desde un timestamptz
function diasDesde(ts){ return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000); }
// '2026-07-01' → 'jul 2026'
function fmtPeriodo(iso){
  if(!iso) return '';
  const [y,m] = String(iso).split('-').map(Number);
  return `${MESES_CORTOS[(m||1)-1]} ${y}`;
}

// Estados de carga / error reutilizables para las zonas de vista
function stateLoading(zone, texto){
  zone.innerHTML = `<div class="state-box"><div class="spinner"></div><h3>${esc(texto)}</h3></div>`;
}
function stateError(zone, msg, retryFn){
  zone.innerHTML = `
    <div class="state-box">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <h3>No se pudo cargar</h3>
      <p>${esc(msg || 'Error de conexión')}</p>
      <p style="margin-top:14px;"><button class="btn" onclick="${retryFn}()">Reintentar</button></p>
    </div>`;
}

// Copiar al portapapeles con fallback (file:// no siempre da clipboard API)
async function copiarTexto(txt){
  if(!txt){ toast('Nada que copiar.', 'err'); return; }
  try{
    await navigator.clipboard.writeText(txt);
    toast('Copiado: ' + txt);
  }catch(e){
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('Copiado: ' + txt); }
    catch(e2){ toast('No se pudo copiar.', 'err'); }
    ta.remove();
  }
}

// ── Planes y gyms ──
async function fetchPlanes(){
  if(PLANES) return PLANES;
  const { data, error } = await sb.from('velum_saas_plans').select('id,price_mxn,is_active');
  if(error){
    console.error(error);
    toast('Error al cargar planes: ' + (error.message || 'desconocido'), 'err');
    return {}; // sin cachear — reintenta en la próxima carga; precioPlan cae al default 999
  }
  PLANES = {};
  (data || []).forEach(p => { PLANES[p.id] = p.price_mxn; });
  return PLANES;
}
// Precio mensual del plan de un gym; si no matchea el catálogo → 999 (plan Max)
function precioPlan(plan){
  return (PLANES && PLANES[plan] != null) ? Number(PLANES[plan]) : 999;
}

async function fetchGyms(){
  const { data, error } = await sb.from('gyms')
    .select('id,nombre,vertical,activo,plan,subscription_status,plan_expires_at,created_at,owner_email')
    .order('created_at', { ascending:false });
  if(error) throw error;
  GYMS = data || [];
  return GYMS;
}

// Estado legible de la cuenta de un gym.
// En producción los gyms de cortesía viven con subscription_status='owner'.
function estadoGym(g){
  const st = g.subscription_status || '';
  if(st === 'owner' || (g.plan || '').toLowerCase() === 'owner')
    return { label:'Owner · cortesía', cls:'neutral' };
  if(st === 'trialing'){
    const dia = Math.max(diasDesde(g.created_at) + 1, 1);
    return { label:`Trial · día ${dia}`, cls:'warn' };
  }
  if(st === 'active')   return { label:'Activo', cls:'ok' };
  if(st === 'past_due') return { label:'Moroso', cls:'danger' };
  if(st === 'canceled' || st === 'cancelled' || g.activo === false)
    return { label:'Cancelado', cls:'danger' };
  return { label: st || 'Sin estado', cls:'neutral' };
}
// Gym que cuenta para "pagando"/MRR: suscripción activa (owner/cortesía queda fuera
// solo porque su status es 'owner', nunca 'active')
function esGymPagando(g){ return g.subscription_status === 'active'; }

// F2a — COCKPIT: 3 métricas + fila secundaria + GMV por mes
// ════════════════════════════════════════════════════════════════

async function loadCockpit(){
  const zone = document.getElementById('cockpit-zone');
  stateLoading(zone, 'Cargando cockpit…');
  try{
    const d = new Date();
    const inicio6m = new Date(d.getFullYear(), d.getMonth() - 5, 1).toISOString();
    const [gyms, _planes, pagosRes, leadsRes, payoutsRes] = await Promise.all([
      fetchGyms(),
      fetchPlanes(),
      sb.from('pagos').select('monto,created_at').gte('created_at', inicio6m).limit(10000),
      sb.from('saas_leads').select('id', { count:'exact', head:true })
        .not('etapa', 'in', '(perdido,pagando,nurture)'),
      sb.from('saas_referral_payouts').select('monto').eq('estado', 'pendiente')
    ]);
    if(pagosRes.error) throw pagosRes.error;
    if(leadsRes.error) throw leadsRes.error;
    if(payoutsRes.error) throw payoutsRes.error;

    const pagos = pagosRes.data || [];
    const pagando = gyms.filter(esGymPagando);
    const mrr = pagando.reduce((s,g) => s + precioPlan(g.plan), 0);
    const trials = gyms.filter(g => g.subscription_status === 'trialing').length;
    const leadsAbiertos = leadsRes.count || 0;
    const comisionesPend = (payoutsRes.data || []).reduce((s,p) => s + (Number(p.monto) || 0), 0);

    // GMV 30 días (todos los gyms) — se filtra en JS del set de 6 meses
    const corte30 = Date.now() - 30 * 86400000;
    const gmv30 = pagos.reduce((s,p) =>
      new Date(p.created_at).getTime() >= corte30 ? s + (Number(p.monto) || 0) : s, 0);

    // GMV agrupado por mes — últimos 6 meses
    const mesesChart = [];
    for(let i = 5; i >= 0; i--){
      const m = new Date(d.getFullYear(), d.getMonth() - i, 1);
      mesesChart.push({
        key:`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}`,
        label: MESES_CORTOS[m.getMonth()], total:0
      });
    }
    pagos.forEach(p => {
      const dt = new Date(p.created_at);
      const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
      const mc = mesesChart.find(x => x.key === key);
      if(mc) mc.total += Number(p.monto) || 0;
    });
    const maxMes = Math.max(...mesesChart.map(m => m.total), 1);
    const barras = mesesChart.map(m => {
      const pct = Math.max(Math.round(m.total / maxMes * 100), 2);
      return `
        <div class="chart-col ${m.total === 0 ? 'cero' : ''}">
          <span class="chart-val">${m.total > 0 ? fmtMoney(m.total) : '·'}</span>
          <div class="chart-bar" style="height:${pct}%"></div>
          <span class="chart-x">${esc(m.label)}</span>
        </div>`;
    }).join('');

    zone.innerHTML = `
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-label">Gyms pagando</div>
          <div class="metric-val">${pagando.length}</div>
          <div class="metric-sub">suscripción activa — owner/cortesía no cuentan</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">MRR</div>
          <div class="metric-val accent">${fmtMoney(mrr)}</div>
          <div class="metric-sub">MXN / mes según plan de cada gym activo</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">GMV · 30 días</div>
          <div class="metric-val">${fmtMoney(gmv30)}</div>
          <div class="metric-sub">pagos registrados en todos los gyms</div>
        </div>
      </div>
      <div class="metric-mini">
        <div class="mini-metric" onclick="showView('cuentas')" title="Ver cuentas">
          <b>${trials}</b><span>trials activos</span>
        </div>
        <div class="mini-metric" onclick="showView('pipeline')" title="Ir al pipeline">
          <b>${leadsAbiertos}</b><span>leads abiertos</span>
        </div>
        <div class="mini-metric" onclick="showView('referidos')" title="Ver referidos">
          <b>${fmtMoney(comisionesPend)}</b><span>comisiones pendientes</span>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">GMV por mes — últimos 6 meses</div>
        <div class="chart-bars">${barras}</div>
      </div>`;
  }catch(e){
    console.error(e);
    stateError(zone, e.message, 'loadCockpit');
    toast('Error al cargar cockpit: ' + (e.message || 'desconocido'), 'err');
  }
}

// F3 — SALUD: semáforo por gym con agregados de uso (una query por
// tabla, agrupación en JS — nunca una query por gym)
// ════════════════════════════════════════════════════════════════

async function fetchSaludAgg(){
  const corte30 = isoDiasAtras(30);
  const corte14ms = Date.now() - 14 * 86400000;
  const [pag, asi, cli] = await Promise.all([
    sb.from('pagos').select('gym_id,created_at').gte('created_at', corte30).limit(10000),
    sb.from('asistencias').select('gym_id,created_at').gte('created_at', corte30).limit(10000),
    sb.from('clientes').select('gym_id').limit(10000)
  ]);
  const err = pag.error || asi.error || cli.error;
  if(err) throw err;
  const agg = {};
  const bump = (gid, campo) => {
    if(gid == null) return;
    agg[gid] = agg[gid] || { p14:0, p30:0, a14:0, a30:0, cli:0 };
    agg[gid][campo]++;
  };
  (pag.data || []).forEach(r => {
    bump(r.gym_id, 'p30');
    if(new Date(r.created_at).getTime() >= corte14ms) bump(r.gym_id, 'p14');
  });
  (asi.data || []).forEach(r => {
    bump(r.gym_id, 'a30');
    if(new Date(r.created_at).getTime() >= corte14ms) bump(r.gym_id, 'a14');
  });
  (cli.data || []).forEach(r => bump(r.gym_id, 'cli'));
  return agg;
}

// verde = pagos Y asistencias en 14d · amarillo = actividad en 30d sin
// cumplir verde · rojo = cero actividad 30d, o trial sin un solo cliente
function semaforoGym(g, a){
  const x = a || { p14:0, p30:0, a14:0, a30:0, cli:0 };
  if(g.subscription_status === 'trialing' && x.cli === 0) return 'rojo';
  if(x.p30 + x.a30 === 0) return 'rojo';
  if(x.p14 > 0 && x.a14 > 0) return 'verde';
  return 'amarillo';
}

async function loadSalud(){
  const zone = document.getElementById('salud-zone');
  stateLoading(zone, 'Cargando salud…');
  try{
    const [gyms, agg] = await Promise.all([fetchGyms(), fetchSaludAgg()]);
    if(gyms.length === 0){
      zone.innerHTML = `
        <div class="state-box">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          <h3>Sin gyms que medir</h3>
          <p>El semáforo de uso aparece cuando exista el primer gym.</p>
        </div>`;
      return;
    }
    const orden = { rojo:0, amarillo:1, verde:2 };
    const filas = gyms
      .map(g => ({ g, a: agg[g.id] || { p14:0, p30:0, a14:0, a30:0, cli:0 }, sem: semaforoGym(g, agg[g.id]) }))
      .sort((x,y) => (orden[x.sem] - orden[y.sem]) || x.g.nombre.localeCompare(y.g.nombre));

    const rows = filas.map(({ g, a, sem }) => {
      const est = estadoGym(g);
      return `
        <tr onclick="openGymDetalle(${g.id})">
          <td><span class="sem-dot sem-${sem}" title="${sem}"></span></td>
          <td><strong>${esc(g.nombre)}</strong></td>
          <td><span class="estado-pill ${est.cls}">${esc(est.label)}</span></td>
          <td class="td-num">${a.p14} / ${a.p30}</td>
          <td class="td-num">${a.a14} / ${a.a30}</td>
          <td class="td-num">${a.cli}</td>
        </tr>`;
    }).join('');
    const resumen = { rojo:0, amarillo:0, verde:0 };
    filas.forEach(f => resumen[f.sem]++);

    zone.innerHTML = `
      <div class="metric-mini">
        <div class="mini-metric"><span class="sem-dot sem-rojo"></span><b>${resumen.rojo}</b><span>en rojo</span></div>
        <div class="mini-metric"><span class="sem-dot sem-amarillo"></span><b>${resumen.amarillo}</b><span>en amarillo</span></div>
        <div class="mini-metric"><span class="sem-dot sem-verde"></span><b>${resumen.verde}</b><span>en verde</span></div>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th></th><th>Gym</th><th>Estado</th><th>Pagos 14d / 30d</th><th>Asist. 14d / 30d</th><th>Clientes</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }catch(e){
    console.error(e);
    stateError(zone, e.message, 'loadSalud');
    toast('Error al cargar salud: ' + (e.message || 'desconocido'), 'err');
  }
}

// Reglas del generador (todas insertan tipo='auto' con su regla_origen):
//   1. lead-vencido  — próxima acción del lead con fecha <= hoy
//   2. lead-frio     — etapa contactado sin evento en 4+ días
//   3. trial-muerto  — gym en trial con 0 clientes
//   4. churn-riesgo  — gym en rojo de salud (si no cayó ya en trial-muerto)
// Dedupe: no se inserta si ya hay tarea abierta con misma regla + lead/gym.
async function generarTareasHoy(){
  const btn = document.getElementById('btn-gen-tareas');
  if(btn){ btn.disabled = true; }
  try{
    const hoy = hoyISO();
    const abRes = await sb.from('saas_tasks')
      .select('regla_origen,lead_id,gym_id').is('done_at', null);
    if(abRes.error) throw abRes.error;
    const existentes = new Set((abRes.data || []).map(t =>
      `${t.regla_origen || ''}|${t.lead_id || ''}|${t.gym_id || ''}`));

    const leadsRes = await sb.from('saas_leads')
      .select('id,empresa,etapa,proxima_accion_fecha,created_at,updated_at');
    if(leadsRes.error) throw leadsRes.error;
    const leads = leadsRes.data || [];

    // Último evento por lead contactado (para la regla lead-frio)
    const contactados = leads.filter(l => l.etapa === 'contactado');
    const ultimoEvento = {};
    if(contactados.length > 0){
      const evRes = await sb.from('saas_lead_events')
        .select('lead_id,created_at').in('lead_id', contactados.map(l => l.id));
      if(evRes.error) throw evRes.error;
      (evRes.data || []).forEach(e => {
        const t = new Date(e.created_at).getTime();
        if(!ultimoEvento[e.lead_id] || t > ultimoEvento[e.lead_id]) ultimoEvento[e.lead_id] = t;
      });
    }

    const [gyms, agg] = await Promise.all([fetchGyms(), fetchSaludAgg()]);

    const candidatas = [];
    // 1) lead-vencido
    leads
      .filter(l => !ETAPAS_TERMINALES.includes(l.etapa)
                && l.proxima_accion_fecha && l.proxima_accion_fecha <= hoy)
      .forEach(l => candidatas.push({
        titulo:`Follow-up: ${l.empresa}`, regla_origen:'lead-vencido', lead_id:l.id, gym_id:null
      }));
    // 2) lead-frio (sin eventos: cuenta desde su última actualización)
    contactados.forEach(l => {
      const ultimo = ultimoEvento[l.id] || new Date(l.updated_at || l.created_at).getTime();
      if(Date.now() - ultimo >= 4 * 86400000){
        candidatas.push({
          titulo:`Re-contactar ${l.empresa}`, regla_origen:'lead-frio', lead_id:l.id, gym_id:null
        });
      }
    });
    // 3) trial-muerto y 4) churn-riesgo
    gyms.forEach(g => {
      const a = agg[g.id] || { p14:0, p30:0, a14:0, a30:0, cli:0 };
      if(g.subscription_status === 'trialing' && a.cli === 0){
        candidatas.push({
          titulo:`Rescate trial: ${g.nombre}`, regla_origen:'trial-muerto', lead_id:null, gym_id:g.id
        });
      }else if(semaforoGym(g, a) === 'rojo'
            && g.subscription_status !== 'canceled' && g.subscription_status !== 'cancelled'
            && g.activo !== false){
        candidatas.push({
          titulo:`Llamar a ${g.nombre} (sin uso)`, regla_origen:'churn-riesgo', lead_id:null, gym_id:g.id
        });
      }
    });

    const nuevas = candidatas
      .filter(c => !existentes.has(`${c.regla_origen}|${c.lead_id || ''}|${c.gym_id || ''}`))
      .map(c => ({ ...c, tipo:'auto', due_date: hoy }));
    const omitidas = candidatas.length - nuevas.length;

    if(nuevas.length > 0){
      const { error } = await sb.from('saas_tasks').insert(nuevas);
      if(error) throw error;
    }
    if(nuevas.length > 0){
      toast(`${nuevas.length} tarea(s) generadas${omitidas > 0 ? ` · ${omitidas} ya estaban abiertas` : ''}`);
    }else{
      toast(candidatas.length > 0
        ? 'Todo lo detectado ya estaba en la lista — nada nuevo.'
        : 'Sin pendientes que generar hoy — pipeline y gyms al día.');
    }
    loadTareas();
  }catch(e){
    console.error(e);
    toast('Error al generar tareas: ' + (e.message || 'desconocido'), 'err');
    const b = document.getElementById('btn-gen-tareas');
    if(b) b.disabled = false;
  }
}

// Cache de referenciadores activos para el select "Referido por" de la ficha
async function ensureReferrers(){
  if(REFERRERS) return REFERRERS;
  const { data, error } = await sb.from('saas_referrers')
    .select('id,nombre').eq('activo', true).order('nombre');
  if(error){
    console.error(error);
    toast('Error al cargar referenciadores: ' + (error.message || 'desconocido'), 'err');
    return [];
  }
  REFERRERS = data || [];
  return REFERRERS;
}

// Llena el select #fl-referrer de la ficha de lead (F1 lo invoca al abrir)
async function poblarReferrerSelect(actual){
  const refs = await ensureReferrers();
  const sel = document.getElementById('fl-referrer');
  if(!sel) return; // la ficha se cerró mientras cargaba
  const actualId = actual != null ? Number(actual) : null;
  let html = '<option value="">— Sin referido —</option>' + refs.map(r =>
    `<option value="${r.id}" ${actualId === r.id ? 'selected' : ''}>${esc(r.nombre)}</option>`).join('');
  // Referenciador inactivo o borrado del cache: no perder la atribución existente
  if(actualId != null && !refs.some(r => r.id === actualId)){
    html += `<option value="${actualId}" selected>Referenciador #${actualId}</option>`;
  }
  sel.innerHTML = html;
}

async function loadReferidos(){
  const zone = document.getElementById('referidos-zone');
  stateLoading(zone, 'Cargando referidos…');
  try{
    const [refsRes, leadsRes, payRes] = await Promise.all([
      sb.from('saas_referrers').select('*').order('created_at', { ascending:false }),
      sb.from('saas_leads').select('id,empresa,etapa,referrer_id,gym_id').not('referrer_id', 'is', null),
      sb.from('saas_referral_payouts').select('id,referrer_id,monto,estado')
    ]);
    if(refsRes.error) throw refsRes.error;
    if(leadsRes.error) throw leadsRes.error;
    if(payRes.error) throw payRes.error;
    REF_DATA = { refs: refsRes.data || [], leads: leadsRes.data || [], payouts: payRes.data || [] };
    // Refrescar también el cache del select de la ficha de lead
    REFERRERS = REF_DATA.refs.filter(r => r.activo).map(r => ({ id:r.id, nombre:r.nombre }));
    renderReferidos();
  }catch(e){
    console.error(e);
    stateError(zone, e.message, 'loadReferidos');
    toast('Error al cargar referidos: ' + (e.message || 'desconocido'), 'err');
  }
}

// Números de un referenciador a partir del estado cargado en REF_DATA
function statsReferrer(rid){
  const leads = REF_DATA.leads.filter(l => l.referrer_id === rid);
  const gymsTraidos = leads.filter(l => l.gym_id != null).length;
  const abiertos = leads.filter(l => !ETAPAS_ABIERTAS_EXCL.includes(l.etapa)).length;
  let pend = 0, pag = 0;
  REF_DATA.payouts.filter(p => p.referrer_id === rid).forEach(p => {
    if(p.estado === 'pagado') pag += Number(p.monto) || 0;
    else pend += Number(p.monto) || 0;
  });
  return { leads, gymsTraidos, abiertos, pend, pag };
}

function openRefModal(id){
  refEditId = id != null ? id : null;
  const r = refEditId != null ? REF_DATA.refs.find(x => x.id === refEditId) : null;
  const c = (r && r.contacto) || {};
  document.getElementById('modal-ref-title').textContent = r ? 'Editar referenciador' : 'Nuevo referenciador';
  document.getElementById('rf-nombre').value = r ? r.nombre : '';
  document.getElementById('rf-tipo').value = r ? r.tipo : 'persona';
  document.getElementById('rf-pct').value = r ? r.pct_comision : 20;
  document.getElementById('rf-tel').value = c.tel || '';
  document.getElementById('rf-mail').value = c.mail || '';
  document.getElementById('rf-ig').value = c.ig || '';
  document.getElementById('rf-clabe').value = c.clabe || '';
  document.getElementById('rf-bono').checked = r ? !!r.bono_primera_mensualidad : true;
  document.getElementById('rf-activo').checked = r ? !!r.activo : true;
  document.getElementById('rf-notas').value = (r && r.notas) || '';
  document.getElementById('modal-ref').classList.add('open');
  setTimeout(() => document.getElementById('rf-nombre').focus(), 60);
}

function closeRefModal(){
  refEditId = null;
  document.getElementById('modal-ref').classList.remove('open');
}

async function guardarRef(){
  const nombre = document.getElementById('rf-nombre').value.trim();
  if(!nombre){ toast('El nombre es obligatorio.', 'err'); return; }
  const pct = parseFloat(document.getElementById('rf-pct').value);
  if(isNaN(pct) || pct < 0 || pct > 100){
    toast('El % de comisión debe estar entre 0 y 100.', 'err'); return;
  }
  const payload = {
    nombre,
    tipo: document.getElementById('rf-tipo').value,
    contacto: {
      tel: document.getElementById('rf-tel').value.trim(),
      mail: document.getElementById('rf-mail').value.trim(),
      ig: document.getElementById('rf-ig').value.trim(),
      clabe: document.getElementById('rf-clabe').value.trim()
    },
    pct_comision: pct,
    bono_primera_mensualidad: document.getElementById('rf-bono').checked,
    notas: document.getElementById('rf-notas').value.trim() || null,
    activo: document.getElementById('rf-activo').checked
  };

  const btn = document.getElementById('btn-guardar-ref');
  btn.disabled = true; btn.textContent = 'Guardando…';
  const q = refEditId != null
    ? sb.from('saas_referrers').update(payload).eq('id', refEditId)
    : sb.from('saas_referrers').insert(payload);
  const { error } = await q;
  btn.disabled = false; btn.textContent = 'Guardar';

  if(error){
    console.error(error);
    toast('Error al guardar referenciador: ' + (error.message || 'desconocido'), 'err');
    return;
  }
  toast(refEditId != null ? 'Referenciador actualizado' : `Referenciador creado: ${nombre}`);
  closeRefModal();
  REFERRERS = null; // invalidar cache del select de la ficha de lead
  loadReferidos();
}
